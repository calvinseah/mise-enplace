<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mise — Roster</title>
<style>
:root{
  --ink:#1A2318;--green:#3D5240;--green-l:#C8D5B9;--green-m:#7A9E7E;
  --surface:#F0F2EC;--card:#ffffff;--card2:#E8EDE3;
  --ink-60:rgba(26,35,24,.60);--ink-30:rgba(26,35,24,.30);
  --ink-08:rgba(26,35,24,.08);--ink-04:rgba(26,35,24,.04);
  --font:'Inter',sans-serif;--font-d:'DM Serif Display',serif;
  --danger:#C0392B;--success:#2E6B3E;
  --foh-bg:#DBEAFE;--foh-text:#1E40AF;--foh-border:#BFDBFE;
  --boh-bg:#FEF3C7;--boh-text:#92400E;--boh-border:#FDE68A;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;font-size:13px}

/* Top bar */
.topbar{background:#1A2318;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.tb-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.tb-icon{width:28px;height:28px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-icon span{font-family:var(--font-d);font-size:16px;color:#fff;line-height:1;font-style:italic}
.tb-name{font-size:16px;font-weight:400;font-family:var(--font-d);color:#fff}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,.15);flex-shrink:0}
.month-nav{display:flex;align-items:center;gap:7px}
.mnav-btn{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.08);border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
.mnav-btn svg{width:15px;height:15px;stroke:#fff}
.month-label{font-size:13.5px;font-weight:500;color:#fff;min-width:120px;text-align:center}
.tb-outlet{height:28px;padding:0 10px;border-radius:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:12px;font-family:var(--font);outline:none;cursor:pointer}
.tb-outlet option{color:var(--ink);background:#fff}
.closed-badge{background:#FEF3C7;color:#92400E;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;flex-shrink:0}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{height:28px;padding:0 12px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:12px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px;text-decoration:none}
.tb-btn svg{width:13px;height:13px;stroke:currentColor}

/* Tabs */
.tabs-bar{background:var(--card);border-bottom:1px solid var(--ink-08);padding:0 20px;display:flex;flex-shrink:0}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:500;color:var(--ink-60);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none;font-family:var(--font)}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* Layout */
.workspace{display:flex;flex:1;overflow:hidden;min-height:0}

/* Staff panel */
.staff-panel{width:200px;flex-shrink:0;background:var(--card);border-right:1px solid var(--ink-08);display:flex;flex-direction:column;overflow:hidden}
.staff-panel-header{padding:12px 14px 8px;border-bottom:1px solid var(--ink-08);flex-shrink:0}
.staff-panel-title{font-size:11px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.staff-hint{font-size:10.5px;color:var(--ink-30);margin-bottom:8px;line-height:1.4}
.staff-search{width:100%;height:28px;border:1px solid var(--ink-08);border-radius:7px;padding:0 10px;font-size:12px;font-family:var(--font);color:var(--ink);outline:none;background:var(--surface)}
.staff-list{flex:1;overflow-y:auto;padding:8px}
.staff-chip{padding:8px 10px;border-radius:8px;background:var(--card2);font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;margin-bottom:5px;user-select:none;display:flex;align-items:center;gap:6px;border:1.5px solid var(--ink-08);transition:all .12s}
.staff-chip:hover{background:var(--green-l);border-color:var(--green-m)}
.staff-chip.selected{background:var(--green);color:#fff;border-color:var(--green)}
.staff-chip.selected .role-dot{background:#fff}
.role-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.foh-dot{background:var(--foh-text)}
.boh-dot{background:var(--boh-text)}

/* Calendar */
.cal-scroll{flex:1;overflow:auto;padding:16px}
.how-to{display:flex;align-items:center;gap:20px;background:var(--card);border:1px solid var(--ink-08);border-radius:12px;padding:12px 18px;margin-bottom:16px;flex-wrap:wrap}
.how-to-step{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-60)}
.step-num{width:22px;height:22px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:600;color:#fff}
.week-row{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:8px;margin-bottom:8px}
.day-card{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);overflow:hidden;min-height:120px}
.day-card.closed{background:#F9F9F7;opacity:.7}
.day-header{display:flex;align-items:baseline;justify-content:space-between;padding:7px 10px 5px;border-bottom:1px solid var(--ink-04)}
.day-num{font-size:14px;font-weight:600;color:var(--ink)}
.day-name{font-size:9px;color:var(--ink-30);text-transform:uppercase;letter-spacing:.06em}
.special-badge{font-size:8px;font-weight:700;background:#FEF3C7;color:#92400E;border-radius:4px;padding:1px 5px;margin-left:auto}
.close-day-btn{background:none;border:none;font-size:9px;color:var(--ink-30);cursor:pointer;font-family:var(--font);padding:0 0 0 4px}
.closed-lbl{text-align:center;padding:16px 8px;font-size:11px;color:var(--ink-30);font-style:italic}
.open-btn{background:rgba(61,82,64,.1);border:none;border-radius:4px;padding:2px 7px;font-size:9.5px;font-weight:600;color:var(--green);cursor:pointer;font-family:var(--font);margin-left:6px}
.section{padding:4px 6px}
.section-label{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 4px;margin-bottom:2px}
.foh-label{color:var(--foh-text)}
.boh-label{color:var(--boh-text)}
.drop-zone{min-height:28px;border-radius:7px;border:1.5px dashed transparent;padding:2px;transition:all .15s;cursor:default}
.drop-zone.ready{border-color:var(--green-m);background:rgba(61,82,64,.04);cursor:pointer}
.drop-zone.ready:hover{border-color:var(--green);background:rgba(61,82,64,.08)}
.drop-zone.drag-over{border-color:var(--green);background:rgba(61,82,64,.08);border-style:solid}
.dz-hint{text-align:center;font-size:9.5px;color:var(--green-m);padding:3px;display:none}
.drop-zone.ready .dz-hint{display:block}

/* Entry */
.sched-entry{display:flex;flex-direction:column;padding:5px 7px;border-radius:8px;margin-bottom:3px;border:1px solid transparent;gap:4px}
.foh-entry{background:var(--foh-bg);border-color:var(--foh-border)}
.boh-entry{background:var(--boh-bg);border-color:var(--boh-border)}
.entry-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.entry-name{font-size:11.5px;font-weight:600;cursor:default;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.foh-entry .entry-name{color:var(--foh-text)}
.boh-entry .entry-name{color:var(--boh-text)}
.entry-times{display:flex;align-items:center;gap:4px}
.time-input{width:64px;height:24px;border:1px solid rgba(255,255,255,.5);border-radius:5px;font-size:11px;font-family:var(--font);color:var(--ink);background:rgba(255,255,255,.7);padding:0 4px;outline:none;cursor:pointer}
.time-input:focus{background:#fff;border-color:var(--green)}
.time-sep{font-size:10px;color:var(--ink-30);flex-shrink:0}
.entry-del{background:none;border:none;cursor:pointer;color:rgba(26,35,24,.25);padding:2px;border-radius:4px;flex-shrink:0;display:flex;align-items:center}
.entry-del:hover{color:var(--danger)}
.entry-del svg{width:12px;height:12px;stroke:currentColor}

/* Overview */
.ov-entry{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:500;margin:2px}
.ov-foh{background:var(--foh-bg);color:var(--foh-text)}
.ov-boh{background:var(--boh-bg);color:var(--boh-text)}
.ov-time{font-size:9px;opacity:.7;font-weight:400}

/* COL */
.col-wrap{padding:20px;max-width:900px}
.col-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.col-stat{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:14px 16px}
.col-stat-label{font-size:10px;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.col-stat-val{font-size:22px;font-weight:400;font-family:var(--font-d);color:var(--green)}
.week-btns{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.wk-btn{padding:5px 14px;border-radius:8px;border:1px solid var(--ink-08);background:var(--card);font-size:12px;color:var(--ink-60);cursor:pointer;font-family:var(--font)}
.wk-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.col-staff-block{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);margin-bottom:8px;overflow:hidden}
.col-staff-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--ink-04);cursor:pointer}
.col-staff-name{font-size:13px;font-weight:600}
.col-staff-rate{font-size:11px;color:var(--ink-60);margin-left:6px}
.col-totals{display:flex;align-items:center;gap:8px}
.col-hours{font-size:12px;color:var(--ink-60)}
.col-cost{font-size:13px;font-weight:600;color:var(--green)}
.col-shift-row{display:flex;align-items:center;padding:7px 16px 7px 28px;border-bottom:1px solid var(--ink-04);font-size:12px}
.col-shift-row:last-child{border-bottom:none}
.col-shift-day{color:var(--ink-60);min-width:80px}
.col-shift-section{min-width:36px}
.col-shift-times{color:var(--ink);flex:1}
.col-shift-hrs{color:var(--ink-60);min-width:50px}
.col-shift-cost{font-weight:500;text-align:right}
.empty{text-align:center;color:var(--ink-60);padding:32px;font-size:13px}

/* Settings */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,35,24,.4);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:90%;max-width:500px;padding:24px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:400;font-family:var(--font-d);color:var(--ink);margin-bottom:20px}
.modal-section{margin-bottom:18px}
.modal-section-label{font-size:11px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.dow-grid{display:flex;flex-wrap:wrap;gap:6px}
.dow-btn{width:44px;height:36px;border-radius:8px;border:1.5px solid var(--ink-08);background:var(--card);font-size:12px;font-weight:500;color:var(--ink-60);cursor:pointer;font-family:var(--font)}
.dow-btn.closed{background:var(--danger);border-color:var(--danger);color:#fff}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--ink-08)}
.btn{height:30px;padding:0 14px;border-radius:8px;border:none;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--green);color:#fff}
.btn-ghost{background:transparent;color:var(--ink-60);border:1px solid var(--ink-08)}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="tb-brand">
    <div class="tb-icon"><span>M</span></div>
    <div class="tb-name">Mise</div>
  </a>
  <div class="tb-sep"></div>
  <div class="month-nav">
    <button class="mnav-btn" onclick="changeMonth(-1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="month-label" id="monthLabel"></div>
    <button class="mnav-btn" onclick="changeMonth(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
  <select class="tb-outlet" id="outletSelect" onchange="onOutletChange()">
    <option value="">All outlets</option>
  </select>
  <div class="closed-badge" id="closedBadge" style="display:none"></div>
  <div class="tb-right">
    <button class="tb-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
    <button class="tb-btn" onclick="exportPDF()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export PDF
    </button>
    <a href="/dashboard" class="tb-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>
      Dashboard
    </a>
  </div>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('schedule')">Schedule</button>
  <button class="tab-btn" onclick="switchTab('overview')">Overview</button>
  <button class="tab-btn" onclick="switchTab('col')">COL</button>
</div>

<div class="workspace" id="workspace">
  <div class="staff-panel" id="staffPanel">
    <div class="staff-panel-header">
      <div class="staff-panel-title">Staff</div>
      <div class="staff-hint">Click a name to select, then click a day section</div>
      <input class="staff-search" id="staffSearch" placeholder="Search…" oninput="filterStaff()">
    </div>
    <div class="staff-list" id="staffList"><div style="font-size:12px;color:var(--ink-30);padding:8px 4px">Loading…</div></div>
  </div>
  <div class="cal-scroll" id="mainContent"></div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-title">Roster settings</div>
    <div class="modal-section">
      <div class="modal-section-label">Closed days of the week</div>
      <div class="dow-grid">
        <button class="dow-btn" data-dow="1" onclick="toggleDow(1)">Mon</button>
        <button class="dow-btn" data-dow="2" onclick="toggleDow(2)">Tue</button>
        <button class="dow-btn" data-dow="3" onclick="toggleDow(3)">Wed</button>
        <button class="dow-btn" data-dow="4" onclick="toggleDow(4)">Thu</button>
        <button class="dow-btn" data-dow="5" onclick="toggleDow(5)">Fri</button>
        <button class="dow-btn" data-dow="6" onclick="toggleDow(6)">Sat</button>
        <button class="dow-btn" data-dow="0" onclick="toggleDow(0)">Sun</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW_NAMES = {0:'Sun',1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat'};
const DAYS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth() + 1;
let curOutlet = '';
let curTab = 'schedule';
let allStaff = [];
let settings = { closed_days: [], overridden_days: [] };
let schedule = [];
let selectedStaff = null;
let colWeek = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  updateMonthLabel();
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href = '/login'; return; }
    const me = await r.json();

    const ro = await fetch('/api/staff/outlets/list');
    if (ro.ok) {
      const outlets = await ro.json();
      const sel = document.getElementById('outletSelect');
      if (me.role === 'manager') sel.querySelector('option[value=""]').style.display = 'none';
      outlets.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.id; opt.textContent = o.name;
        sel.appendChild(opt);
      });
      if (outlets.length >= 1) { curOutlet = String(outlets[0].id); sel.value = curOutlet; }
    }
  } catch(e) {}

  try {
    const r = await fetch('/api/staff');
    if (r.ok) {
      const data = await r.json();
      allStaff = data.filter(s => s.is_active !== 0 && s.is_active !== false);
    }
  } catch(e) {}

  renderStaffPanel();
  await loadAll();
}

function updateMonthLabel() {
  document.getElementById('monthLabel').textContent = MONTHS[curMonth-1] + ' ' + curYear;
}

async function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1)  { curMonth = 12; curYear--; }
  updateMonthLabel();
  await loadAll();
}

async function onOutletChange() {
  curOutlet = document.getElementById('outletSelect').value;
  await loadAll();
}

async function loadAll() {
  await Promise.all([loadSettings(), loadSchedule()]);
  render();
}

async function loadSettings() {
  try {
    const p = new URLSearchParams({ year: curYear, month: curMonth });
    if (curOutlet) p.set('outletId', curOutlet);
    const r = await fetch('/api/roster/settings?' + p);
    if (r.ok) {
      settings = await r.json();
      settings.overridden_days = settings.overridden_days || [];
      updateClosedBadge();
    }
  } catch(e) {}
}

async function loadSchedule() {
  try {
    const p = new URLSearchParams({ year: curYear, month: curMonth });
    if (curOutlet) p.set('outletId', curOutlet);
    const r = await fetch('/api/roster/schedule?' + p);
    if (r.ok) schedule = await r.json();
  } catch(e) {}
}

function updateClosedBadge() {
  const badge = document.getElementById('closedBadge');
  const days = settings.closed_days || [];
  if (days.length) {
    badge.textContent = 'Closed ' + days.map(d => DOW_NAMES[d]).join(', ');
    badge.style.display = 'block';
  } else badge.style.display = 'none';
}

// ── Staff panel ───────────────────────────────────────────────────────────────
function renderStaffPanel() {
  const list = document.getElementById('staffList');
  const q = (document.getElementById('staffSearch')?.value || '').toLowerCase();
  const filtered = allStaff.filter(s => s.name.toLowerCase().includes(q));
  if (!filtered.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--ink-30);padding:8px 4px">No staff found</div>';
    return;
  }
  list.innerHTML = filtered.map(s => {
    const isSel = selectedStaff && selectedStaff.staffId === s.id;
    const roleUpper = (s.role || '').toUpperCase();
    return '<div class="staff-chip' + (isSel ? ' selected' : '') + '" draggable="true" onclick="selectStaff(' + s.id + ',\'' + s.name.replace(/'/g, "\\'") + '\',\'' + roleUpper + '\')" ondragstart="onChipDrag(event,' + s.id + ',\'' + s.name.replace(/'/g, "\\'") + '\',\'' + roleUpper + '\')">' +
      '<div class="role-dot ' + (roleUpper === 'BOH' ? 'boh-dot' : 'foh-dot') + '"></div>' +
      s.name + (isSel ? ' ✓' : '') +
      '</div>';
  }).join('');
}

function filterStaff() { renderStaffPanel(); }

function selectStaff(id, name, role) {
  if (selectedStaff && selectedStaff.staffId === id) {
    selectedStaff = null;
  } else {
    selectedStaff = { staffId: id, staffName: name, staffRole: role };
  }
  renderStaffPanel();
  attachDropZones();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['schedule','overview','col'][i] === tab);
  });
  document.getElementById('staffPanel').style.display = tab === 'schedule' ? 'flex' : 'none';
  render();
}

function render() {
  if (curTab === 'schedule') renderSchedule();
  else if (curTab === 'overview') renderOverview();
  else if (curTab === 'col') renderCOL();
}

// ── Calendar helpers ──────────────────────────────────────────────────────────
function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getFirstDow(y, m) { return new Date(y, m-1, 1).getDay(); }
function isClosed(day) {
  if ((settings.overridden_days || []).includes(day)) return false;
  return (settings.closed_days || []).includes(new Date(curYear, curMonth-1, day).getDay());
}
function isOverridden(day) { return (settings.overridden_days || []).includes(day); }
function getDayShort(day) { return DAYS_SHORT[(new Date(curYear, curMonth-1, day).getDay() + 6) % 7]; }
function getFullDow(day) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(curYear, curMonth-1, day).getDay()]; }

function buildWeeks() {
  const total = getDaysInMonth(curYear, curMonth);
  const offset = (getFirstDow(curYear, curMonth) + 6) % 7;
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= total; d++) cells.push(d);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) {
    const w = cells.slice(i, i+7);
    while (w.length < 7) w.push(null);
    weeks.push(w);
  }
  return weeks;
}

// ── Schedule ──────────────────────────────────────────────────────────────────
function renderSchedule() {
  const content = document.getElementById('mainContent');
  if (!curOutlet) {
    content.innerHTML = '<div class="empty" style="padding:80px 20px">' +
      '<div style="font-size:15px;font-weight:500;color:var(--ink);margin-bottom:6px">Select an outlet to view the schedule</div>' +
      '<div style="font-size:13px;color:var(--ink-60)">Use the outlet dropdown in the top bar</div></div>';
    return;
  }
  const weeks = buildWeeks();
  const howTo = '<div class="how-to">' +
    '<div class="how-to-step"><div class="step-num">1</div>Click or drag a staff name from the left</div>' +
    '<div class="how-to-step"><div class="step-num">2</div>Click or drop onto a FOH or BOH section</div>' +
    '<div class="how-to-step"><div class="step-num">3</div>Set start &amp; end times next to each name</div>' +
    '</div>';
  content.innerHTML = howTo + weeks.map(week =>
    '<div class="week-row">' +
    week.map(day => day === null ? '<div></div>' : renderDayCard(day)).join('') +
    '</div>'
  ).join('');
  attachDropZones();
}

function renderDayCard(day) {
  const closed = isClosed(day);
  const overridden = isOverridden(day);
  const dayName = getDayShort(day);
  const daySchedule = schedule.filter(s => s.day == day && !s.removed);
  const foh = daySchedule.filter(s => s.role_group === 'foh');
  const boh = daySchedule.filter(s => s.role_group === 'boh');

  if (closed) {
    return '<div class="day-card closed">' +
      '<div class="day-header"><span class="day-num">' + day + '</span><span class="day-name">' + dayName + '</span></div>' +
      '<div class="closed-lbl">Closed <button class="open-btn" onclick="toggleOverride(' + day + ')">Open</button></div>' +
      '</div>';
  }

  const specialBadge = overridden ? '<span class="special-badge">SPECIAL</span>' : '';
  const closeBtn = '<button class="close-day-btn" onclick="toggleOverride(' + day + ')" title="Close this day">✕</button>';

  return '<div class="day-card" id="daycard-' + day + '">' +
    '<div class="day-header"><span class="day-num">' + day + '</span><span class="day-name">' + dayName + '</span>' + specialBadge + (overridden ? closeBtn : '') + '</div>' +
    '<div class="section"><div class="section-label foh-label">FOH</div>' +
    '<div class="drop-zone" id="dz-' + day + '-foh" data-day="' + day + '" data-group="foh">' +
    foh.map(e => renderEntry(e)).join('') +
    '<div class="dz-hint">+ click to add</div></div></div>' +
    '<div class="section"><div class="section-label boh-label">BOH</div>' +
    '<div class="drop-zone" id="dz-' + day + '-boh" data-day="' + day + '" data-group="boh">' +
    boh.map(e => renderEntry(e)).join('') +
    '<div class="dz-hint">+ click to add</div></div></div>' +
    '</div>';
}

function renderEntry(e) {
  const cls = e.role_group === 'boh' ? 'boh-entry' : 'foh-entry';
  const startVal = e.start_time || '';
  const endVal = e.end_time || '';
  return '<div class="sched-entry ' + cls + '" id="entry-' + e.id + '" onclick="event.stopPropagation()">' +
    '<div class="entry-top">' +
    '<span class="entry-name">' + e.staff_name + '</span>' +
    '<button class="entry-del" onclick="removeEntry(' + e.id + ')">' +
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
    '</button></div>' +
    '<div class="entry-times">' +
    '<input type="time" class="time-input" value="' + startVal + '" onchange="updateEntryTime(' + e.id + ',\'start\',this.value)">' +
    '<span class="time-sep">→</span>' +
    '<input type="time" class="time-input" value="' + endVal + '" onchange="updateEntryTime(' + e.id + ',\'end\',this.value)">' +
    '</div></div>';
}

function attachDropZones() {
  document.querySelectorAll('.drop-zone').forEach(dz => {
    if (selectedStaff) {
      dz.classList.add('ready');
      dz.onclick = function() { handleClick(this); };
    } else {
      dz.classList.remove('ready');
      dz.onclick = null;
    }
    // Always attach drag/drop for mouse users
    dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag-over'); };
    dz.ondragleave = () => dz.classList.remove('drag-over');
    dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag-over'); handleDrop(dz); };
  });
}

async function handleClick(dz) {
  if (!selectedStaff) return;
  const day = parseInt(dz.dataset.day);
  const group = dz.dataset.group;
  await addToSchedule(selectedStaff.staffId, day, group);
}

async function addToSchedule(staffId, day, group, startTime, endTime) {
  const exists = schedule.find(s => s.staff_id == staffId && s.day == day && !s.removed);
  if (exists) {
    await fetch('/api/roster/schedule/' + exists.id, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ role_group: group })
    });
  } else {
    await fetch('/api/roster/schedule', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        staffId, outletId: curOutlet || null, year: curYear, month: curMonth,
        day, role_group: group, shift_label: '',
        start_time: startTime || '', end_time: endTime || ''
      })
    });
  }
  await loadSchedule();
  renderSchedule();
  attachDropZones();
}

async function removeEntry(id) {
  await fetch('/api/roster/schedule/' + id, { method: 'DELETE' });
  schedule = schedule.filter(s => s.id !== id);
  renderSchedule();
  attachDropZones();
}

async function updateEntryTime(id, field, value) {
  const entry = schedule.find(s => s.id === id);
  if (!entry) return;
  const prev = field === 'start' ? entry.start_time : entry.end_time;
  if (field === 'start') entry.start_time = value;
  if (field === 'end') entry.end_time = value;
  const label = entry.start_time && entry.end_time ? entry.start_time + '-' + entry.end_time : '';
  const fail = (msg) => {
    if (field === 'start') entry.start_time = prev; else entry.end_time = prev;
    renderSchedule(); attachDropZones();
    alert(msg);
  };
  try {
    const r = await fetch('/api/roster/schedule/' + id, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ shift_label: label, start_time: entry.start_time, end_time: entry.end_time })
    });
    if (!r.ok) {
      fail(r.status === 401
        ? 'Your session has expired, so the timing was not saved. Please log in again and re-enter it.'
        : 'The timing could not be saved. Please try again.');
    }
  } catch(e) {
    fail('Network error — the timing was not saved. Please try again.');
  }
}

// ── Override closed days ──────────────────────────────────────────────────────
async function toggleOverride(day) {
  const overrides = settings.overridden_days || [];
  const idx = overrides.indexOf(day);
  if (idx >= 0) overrides.splice(idx, 1);
  else overrides.push(day);
  settings.overridden_days = overrides;
  try {
    await fetch('/api/roster/settings', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        year: curYear, month: curMonth, outletId: curOutlet || null,
        closed_days: settings.closed_days, shift_times: settings.shift_times || {},
        overridden_days: overrides
      })
    });
  } catch(e) {}
  render();
}

// ── Overview ──────────────────────────────────────────────────────────────────
function renderOverview() {
  const content = document.getElementById('mainContent');
  if (!curOutlet) {
    content.innerHTML = '<div class="empty" style="padding:80px 20px"><div style="font-size:15px;font-weight:500">Select an outlet to view the schedule</div></div>';
    return;
  }
  const weeks = buildWeeks();
  content.innerHTML = weeks.map(week =>
    '<div class="week-row" style="margin-bottom:8px">' +
    week.map(day => {
      if (!day) return '<div></div>';
      const closed = isClosed(day);
      const dayName = getDayShort(day);
      if (closed) return '<div class="day-card closed"><div class="day-header"><span class="day-num">' + day + '</span><span class="day-name">' + dayName + '</span></div><div class="closed-lbl">Closed</div></div>';
      const daySchedule = schedule.filter(s => s.day == day && !s.removed);
      const foh = daySchedule.filter(s => s.role_group === 'foh');
      const boh = daySchedule.filter(s => s.role_group === 'boh');
      const fmt = e => {
        let t = '';
        if (e.start_time && e.end_time) t = ' ' + e.start_time.slice(0,5) + '–' + e.end_time.slice(0,5);
        return '<span class="ov-entry ov-' + e.role_group + '">' + e.staff_name + '<span class="ov-time">' + t + '</span></span>';
      };
      if (!daySchedule.length) return '<div class="day-card"><div class="day-header"><span class="day-num">' + day + '</span><span class="day-name">' + dayName + '</span></div><div style="padding:8px;font-size:10.5px;color:var(--ink-30);font-style:italic">Unscheduled</div></div>';
      return '<div class="day-card"><div class="day-header"><span class="day-num">' + day + '</span><span class="day-name">' + dayName + '</span></div><div style="padding:6px 8px">' + foh.map(fmt).join('') + boh.map(fmt).join('') + '</div></div>';
    }).join('') +
    '</div>'
  ).join('');
}

// ── COL ───────────────────────────────────────────────────────────────────────
async function renderCOL() {
  const content = document.getElementById('mainContent');
  const total = getDaysInMonth(curYear, curMonth);
  const numWeeks = Math.ceil((total + (getFirstDow(curYear, curMonth) + 6) % 7) / 7);
  const wkBtns = '<button class="wk-btn' + (colWeek===0?' active':'') + '" onclick="setColWeek(0)">Full month</button>' +
    Array.from({length:numWeeks},(_,i)=>'<button class="wk-btn' + (colWeek===i+1?' active':'') + '" onclick="setColWeek(' + (i+1) + ')">Week ' + (i+1) + '</button>').join('');
  content.innerHTML = '<div class="col-wrap"><div class="week-btns">' + wkBtns + '</div><div id="colData"><div class="empty">Loading…</div></div></div>';
  await loadColData();
}

async function setColWeek(w) { colWeek = w; await renderCOL(); }

async function loadColData() {
  try {
    const p = new URLSearchParams({ year: curYear, month: curMonth });
    if (curOutlet) p.set('outletId', curOutlet);
    if (colWeek) p.set('week', colWeek);
    const r = await fetch('/api/roster/col?' + p);
    const d = await r.json();
    const el = document.getElementById('colData');
    if (!el) return;
    const staffHtml = d.staff.map(s =>
      '<div class="col-staff-block">' +
      '<div class="col-staff-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">' +
      '<div><span class="col-staff-name">' + s.name + '</span><span class="col-staff-rate">$' + s.hourly_rate + '/hr</span></div>' +
      '<div class="col-totals"><span class="col-hours">' + s.totalHours.toFixed(1) + 'h</span><span class="col-cost">$' + s.totalCost.toFixed(2) + '</span></div>' +
      '</div><div class="col-shifts">' +
      s.shifts.map(sh =>
        '<div class="col-shift-row">' +
        '<span class="col-shift-day">' + getFullDow(sh.day) + ' ' + sh.day + '</span>' +
        '<span class="col-shift-section" style="color:' + (sh.section==='boh'?'var(--boh-text)':'var(--foh-text)') + '">' + (sh.section||'foh').toUpperCase() + '</span>' +
        '<span class="col-shift-times">' + (sh.shift_label||'—') + '</span>' +
        '<span class="col-shift-hrs">' + sh.hours.toFixed(1) + 'h</span>' +
        '<span class="col-shift-cost">$' + sh.cost.toFixed(2) + '</span>' +
        '</div>'
      ).join('') +
      '</div></div>'
    ).join('');
    el.innerHTML = '<div style="font-size:12px;color:var(--ink-60);margin-bottom:12px">Cost of Labour — ' + MONTHS[curMonth-1] + ' ' + curYear + '</div>' +
      '<div class="col-stats">' +
      '<div class="col-stat"><div class="col-stat-label">Total payroll</div><div class="col-stat-val">$' + d.totals.totalCost.toFixed(2) + '</div></div>' +
      '<div class="col-stat"><div class="col-stat-label">Total hours</div><div class="col-stat-val">' + d.totals.totalHours.toFixed(1) + 'h</div></div>' +
      '<div class="col-stat"><div class="col-stat-label">Staff</div><div class="col-stat-val">' + d.staff.length + '</div></div>' +
      '</div>' +
      (staffHtml || '<div class="empty">No scheduled shifts with times set yet.</div>');
  } catch(e) { console.error(e); }
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings() {
  const closed = settings.closed_days || [];
  document.querySelectorAll('.dow-btn').forEach(b => {
    b.classList.toggle('closed', closed.includes(parseInt(b.dataset.dow)));
  });
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function toggleDow(dow) { document.querySelector('.dow-btn[data-dow="' + dow + '"]').classList.toggle('closed'); }
async function saveSettings() {
  const closed = [];
  document.querySelectorAll('.dow-btn.closed').forEach(b => closed.push(parseInt(b.dataset.dow)));
  try {
    await fetch('/api/roster/settings', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ year: curYear, month: curMonth, outletId: curOutlet || null, closed_days: closed, shift_times: settings.shift_times || {}, overridden_days: settings.overridden_days || [] })
    });
    settings.closed_days = closed;
    updateClosedBadge();
    closeSettings();
    render();
  } catch(e) {}
}



let dragData = null;

function onChipDrag(e, id, name, role) {
  dragData = { type: 'chip', staffId: id, staffName: name, staffRole: role };
  e.dataTransfer.effectAllowed = 'copy';
}

async function handleDrop(dz) {
  if (!dragData) return;
  const day = parseInt(dz.dataset.day);
  const group = dz.dataset.group;
  if (dragData.type === 'chip') {
    await addToSchedule(dragData.staffId, day, group);
  }
  dragData = null;
}

function exportPDF() {
  if (!curOutlet) { alert('Please select an outlet first.'); return; }
  const outletName = document.getElementById('outletSelect').options[document.getElementById('outletSelect').selectedIndex]?.text || '';
  const monthName = MONTHS[curMonth-1] + ' ' + curYear;
  const weeks = buildWeeks();
  const DOW_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Build calendar grid (one cell per day, Mon–Sun columns)
  const DOW_HEAD = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const headRow = DOW_HEAD.map(d => '<th>' + d + '</th>').join('');

  const fmtNames = arr => arr.map(e => {
    const t = e.start_time && e.end_time
      ? ' <span class="t">' + e.start_time.slice(0,5) + '–' + e.end_time.slice(0,5) + '</span>' : '';
    return '<div class="nm">' + e.staff_name + t + '</div>';
  }).join('');

  let gridRows = '';
  weeks.forEach(week => {
    let cells = '';
    week.forEach(day => {
      if (!day) { cells += '<td class="cell empty"></td>'; return; }
      const closed     = isClosed(day);
      const overridden = isOverridden(day);
      const daySchedule = schedule.filter(s => s.day == day && !s.removed);
      const foh = daySchedule.filter(s => s.role_group === 'foh');
      const boh = daySchedule.filter(s => s.role_group === 'boh');

      let body;
      if (closed) {
        body = '<div class="closed">Closed</div>';
      } else {
        body = '<div class="grp"><div class="glbl foh">FOH</div>' + (foh.length ? fmtNames(foh) : '<div class="none">—</div>') + '</div>' +
               '<div class="grp"><div class="glbl boh">BOH</div>' + (boh.length ? fmtNames(boh) : '<div class="none">—</div>') + '</div>';
      }
      const cls = 'cell' + (closed ? ' closed-cell' : '') + (overridden ? ' special' : '');
      cells += '<td class="' + cls + '">' +
        '<div class="dnum">' + day + (overridden ? ' <span class="sp">SPECIAL</span>' : '') + '</div>' +
        body + '</td>';
    });
    gridRows += '<tr>' + cells + '</tr>';
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">

    td.cell{border:1px solid #D8DCD2;vertical-align:top;padding:5px;height:120px;width:14.28%;overflow:hidden}
    td.empty{background:#FAFAF8;border-color:#EEE}
    td.closed-cell{background:#FAFAFA}
    td.special{background:#FFFBEB}
    .dnum{font-weight:700;font-size:11px;margin-bottom:5px;color:#1A2318}
    .sp{font-size:7px;background:#FEF3C7;color:#92400E;border-radius:3px;padding:1px 4px;vertical-align:middle;letter-spacing:.03em}
    .grp{margin-bottom:5px}
    .glbl{font-size:7.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:2px}
    .glbl.foh{color:#1E40AF}
    .glbl.boh{color:#92400E}
    .nm{font-size:9px;line-height:1.35;margin-bottom:1px}
    .nm .t{color:#888;font-size:8px;white-space:nowrap}
    .none{color:#CCC;font-size:9px}
    .closed{color:#BBB;font-style:italic;font-size:9px}
    .footer{margin-top:18px;font-size:9px;color:#BBB;text-align:center}
    @media print{body{padding:0}@page{size:A4 landscape;margin:1cm}tr{break-inside:avoid}}
  </style></head><body>
  <h1>${outletName}</h1>
  <div class="sub">Roster · ${monthName} · Generated ${new Date().toLocaleDateString('en-SG')}</div>
  <table class="cal">
    <thead><tr>${headRow}</tr></thead>
    <tbody>${gridRows}</tbody>
  </table>

  </body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (win) {

}
