<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mise — Audit Log</title>
<style>
:root{--ink:#1A2318;--accent:#3D5240;--surface:#F0F2EC;--ink-60:rgba(26,35,24,.60);--ink-30:rgba(26,35,24,.30);--ink-08:rgba(26,35,24,.08);--white:#ffffff;--font:'Inter',sans-serif;--font-display:'DM Serif Display',serif;--danger:#C0392B;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);display:flex;min-height:100vh;font-size:13px}
.sidebar{width:216px;background:#1A2318;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-icon{width:28px;height:28px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.sb-icon span{font-family:var(--font-display);font-size:16px;color:#fff;line-height:1;font-style:italic}
.sb-name{font-size:15px;font-weight:400;color:#fff;font-family:var(--font-display)}
.sb-nav{padding:8px;flex:1}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;color:rgba(255,255,255,.45);text-decoration:none;font-size:12.5px;font-weight:500;margin-bottom:1px}
.sb-nav a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.sb-nav a.active{color:#fff;background:rgba(255,255,255,.09)}
.sb-nav a svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.3);font-size:11.5px;font-family:var(--font);cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.main{flex:1;padding:28px 32px;min-width:0}
.page-title{font-size:22px;font-weight:400;color:var(--ink);font-family:var(--font-display)}
.page-sub{font-size:12.5px;color:var(--ink-60);margin-top:3px;margin-bottom:20px}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{height:32px;padding:0 12px;border:1px solid var(--ink-08);border-radius:8px;font-size:12.5px;font-family:var(--font);color:var(--ink);background:var(--white);outline:none}
.card{background:var(--white);border-radius:16px;border:1px solid var(--ink-08);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:1px solid var(--ink-08);background:var(--surface)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--ink-08);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface)}
.action-badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:600}
.badge-clock{background:#EFF6FF;color:#1D4ED8}
.badge-amend{background:#FEF3C7;color:#92400E}
.badge-leave{background:#F0FDF4;color:#166534}
.badge-staff{background:#F5F3FF;color:#5B21B6}
.badge-system{background:var(--surface);color:var(--ink-60)}
.empty{text-align:center;padding:48px;color:var(--ink-60)}
.load-more{width:100%;padding:12px;text-align:center;font-size:13px;color:var(--accent);cursor:pointer;border-top:1px solid var(--ink-08);background:none;border-left:none;border-right:none;border-bottom:none;font-family:var(--font)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none">
      <div class="sb-icon"><span>M</span></div>
      <div><div class="sb-name">Mise</div></div>
    </a>
  </div>
  <nav class="sb-nav">
    <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>Dashboard</a>
    <a href="/staff"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Staff</a>
    <a href="/payslip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Payslip</a>
    <a href="/payroll-summary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payroll</a>
    <a href="/companies"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Companies</a>
    <a href="/audit" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>Audit Log</a>
    <a href="/users"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
  </nav>
  <div class="sb-footer">
    <button class="sb-logout" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-title">Audit Log</div>
  <div class="page-sub">All changes made by managers and admins</div>

  <div class="filters">
    <select id="filterEntity" onchange="load()">
      <option value="">All categories</option>
      <option value="attendance">Attendance</option>
      <option value="leave">Leave</option>
      <option value="leave_entitlement">Leave entitlements</option>
      <option value="staff">Staff</option>
    </select>
    <input type="text" id="filterActor" placeholder="Filter by user…" oninput="load()" style="width:160px">
    <input type="date" id="filterDate" onchange="load()">
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th style="width:150px">Time</th>
          <th style="width:110px">User</th>
          <th style="width:130px">Action</th>
          <th>Staff</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load more</button>
  </div>
</main>

<script>
let offset = 0;
const LIMIT = 50;

const ACTION_LABELS = {
  clock_out: ['Clock out', 'badge-clock'],
  amend_attendance: ['Amend attendance', 'badge-amend'],
  leave_applied: ['Leave applied', 'badge-leave'],
  leave_approved: ['Leave approved', 'badge-leave'],
  leave_rejected: ['Leave rejected', 'badge-leave'],
  update_leave_entitlement: ['Update entitlement', 'badge-leave'],
  update_staff: ['Update staff', 'badge-staff'],
};

async function load(reset = true) {
  if (reset) { offset = 0; document.getElementById('logBody').innerHTML = ''; }
  const entity = document.getElementById('filterEntity').value;
  const actor  = document.getElementById('filterActor').value.trim();
  const date   = document.getElementById('filterDate').value;

  const p = new URLSearchParams({ limit: LIMIT, offset });
  if (entity) p.set('entity', entity);
  if (actor)  p.set('actor', actor);

  try {
    const r = await fetch('/api/audit?' + p);
    const logs = await r.json();

    let rows = logs;
    if (date) rows = logs.filter(l => l.created_at.startsWith(date));

    const tbody = document.getElementById('logBody');
    if (!rows.length && offset === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No audit records yet</td></tr>';
      document.getElementById('loadMoreBtn').style.display = 'none';
      return;
    }

    rows.forEach(l => {
      const [label, cls] = ACTION_LABELS[l.action] || [l.action, 'badge-system'];
      const time = new Date(l.created_at).toLocaleString('en-SG', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit', hour12:true });
      let details = '';
      try {
        const d = JSON.parse(l.details || '{}');
        details = Object.entries(d).map(([k,v]) => `<span style="color:var(--ink-60)">${k}:</span> <strong>${v ?? '—'}</strong>`).join(' · ');
      } catch(e) { details = l.details || '—'; }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-size:12px;color:var(--ink-60);white-space:nowrap">${time}</td>
        <td style="font-size:12px;font-weight:500">${l.actor}</td>
        <td><span class="action-badge ${cls}">${label}</span></td>
        <td style="font-size:12px">${l.staff_name || '—'}</td>
        <td style="font-size:11.5px;color:var(--ink-60)">${details}</td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('loadMoreBtn').style.display = logs.length === LIMIT ? 'block' : 'none';
    offset += logs.length;
  } catch(e) { console.error(e); }
}

function loadMore() { load(false); }

async function logout() { await fetch('/api/auth/logout', {method:'POST'}); location.href='/login'; }

// Auth check
fetch('/api/me').then(r => { if (!r.ok) location.href='/login'; return r.json(); })
  .then(u => { if (u.role !== 'admin') location.href='/dashboard'; else load(); });
</script>
</body>
</html>
