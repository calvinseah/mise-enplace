<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F0F2EC">
<title>Mise</title>
<style>
:root {
  --bg:      #F0F2EC;
  --green:   #3D5240;
  --green-l: #C8D5B9;
  --green-m: #7A9E7E;
  --card:    #ffffff;
  --card2:   #E8EDE3;
  --text:    #1A2318;
  --muted:   rgba(26,35,24,.5);
  --font:    'Inter', sans-serif;
  --font-d:  'DM Serif Display', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
}

/* Header */
.header {
  padding: 56px 28px 32px;
  padding-top: max(56px, calc(env(safe-area-inset-top) + 32px));
  background: var(--bg);
}
.greeting-sub { font-size: 15px; font-weight: 400; color: var(--muted); margin-bottom: 4px; }
.greeting-main {
  font-size: 38px; font-weight: 400;
  font-family: var(--font-d);
  color: var(--text); line-height: 1.1;
}
.greeting-main span { font-style: italic; }

/* Time pill */
.time-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--card2); border-radius: 20px;
  padding: 7px 14px; font-size: 13px; font-weight: 500;
  color: var(--green); margin-top: 16px;
}
.time-pill svg { width: 13px; height: 13px; stroke: var(--green); }

/* Scroll content */
.content {
  flex: 1; overflow-y: auto;
  padding: 8px 20px;
  padding-bottom: max(32px, env(safe-area-inset-bottom));
}

/* Menu cards */
.menu-card {
  background: var(--card);
  border-radius: 24px;
  padding: 20px 22px;
  margin-bottom: 12px;
  display: flex; align-items: center;
  gap: 18px;
  text-decoration: none;
  cursor: pointer; border: none; width: 100%;
  text-align: left;
  box-shadow: 0 2px 12px rgba(26,35,24,.06), 0 1px 3px rgba(26,35,24,.04);
  transition: transform .15s, box-shadow .15s;
  -webkit-user-select: none; user-select: none;
}
.menu-card:active { transform: scale(.97); box-shadow: 0 1px 6px rgba(26,35,24,.06); }

.menu-card-primary {
  background: var(--green);
  color: #fff;
}
.menu-card-primary .card-icon { background: rgba(255,255,255,.15); }
.menu-card-primary .card-icon svg { stroke: #fff; }
.menu-card-primary .card-title { color: #fff; }
.menu-card-primary .card-sub { color: rgba(255,255,255,.6); }
.menu-card-primary .card-arrow svg { stroke: rgba(255,255,255,.5); }

.card-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-icon svg { width: 22px; height: 22px; stroke: var(--green); }

.card-body { flex: 1; }
.card-title { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
.card-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

.card-arrow { flex-shrink: 0; }
.card-arrow svg { width: 18px; height: 18px; stroke: var(--muted); }

/* Bottom summary card */
.summary-card {
  background: var(--green-l);
  border-radius: 24px;
  padding: 20px 22px;
  margin-top: 4px;
  margin-bottom: 12px;
  text-align: center;
}
.summary-card p { font-size: 13.5px; color: var(--green); font-weight: 500; line-height: 1.5; }
.summary-card strong { color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div style="width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 4px 14px rgba(61,82,64,.25)"><span style="font-family:'DM Serif Display',serif;font-size:26px;font-weight:400;color:#fff;line-height:1">M</span></div>
  <div class="greeting-sub" id="greetSub">Good morning</div>
  <div class="greeting-main">Welcome to<br><span>Mise</span></div>
  <div class="time-pill">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span id="timePill"></span>
  </div>
</div>

<div class="content">

  <a href="/clock" class="menu-card menu-card-primary">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">Clock In / Clock Out</div>
      <div class="card-sub">Record your shift</div>
    </div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  </a>

  <a href="/join" class="menu-card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">Submit Your Details</div>
      <div class="card-sub">New staff registration</div>
    </div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  </a>

  <a href="/dashboard" class="menu-card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/>
        <rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">Manager Dashboard</div>
      <div class="card-sub">Attendance · Payslip · Staff</div>
    </div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  </a>


  <a href="/my-shifts" class="menu-card">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <div class="card-body">
      <div class="card-title">My Shifts</div>
      <div class="card-sub">View your hours by NRIC</div>
    </div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </div>
  </a>

  <div class="summary-card">
    <p>Restaurant management platform<br><strong>Mise</strong> — Built for your team</p>
  </div>

</div>

<script>
function tick() {
  const now = new Date();
  const h = now.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greetSub').textContent = greet;
  const time = now.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', hour12: true });
  const date = now.toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short' });
  document.getElementById('timePill').textContent = `${time} · ${date}`;
}
tick(); setInterval(tick, 15000);
</script>
</body>
</html>
