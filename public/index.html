<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<title>Mise</title>
<style>
  :root {
    --ink: #0F172A;
    --accent: #6366F1;
    --font: 'Inter', sans-serif;
    --font-display: 'DM Serif Display', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--ink);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
  }

  /* Brand */
  .brand { text-align: center; margin-bottom: 48px; }
  .brand-icon {
    width: 64px; height: 64px;
    background: var(--accent);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    box-shadow: 0 8px 24px rgba(99,102,241,.35);
  }
  .brand-icon svg { width: 32px; height: 32px; stroke: #fff; }
  .brand-name {
    font-size: clamp(40px, 12vw, 56px);
    font-weight: 400;
    font-family: var(--font-display);
    color: #fff;
    letter-spacing: .01em;
    line-height: 1;
  }
  .brand-sub {
    font-size: 13px;
    color: rgba(255,255,255,.35);
    margin-top: 8px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* Time */
  .time-display {
    font-size: 14px;
    color: rgba(255,255,255,.35);
    font-variant-numeric: tabular-nums;
    text-align: center;
    margin-bottom: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .time-display svg { width: 13px; height: 13px; opacity: .5; }

  /* Menu */
  .menu {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .menu-btn {
    width: 100%;
    height: 68px;
    border-radius: 14px;
    border: none;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    text-decoration: none;
    transition: transform .15s, opacity .15s;
    letter-spacing: -.01em;
    -webkit-user-select: none;
    user-select: none;
  }
  .menu-btn:active { transform: scale(.97); opacity: .9; }

  /* Primary */
  .menu-btn-primary { background: #fff; color: var(--ink); }
  .menu-btn-primary .btn-icon { background: var(--accent); }
  .menu-btn-primary .btn-icon svg { stroke: #fff; }

  /* Secondary */
  .menu-btn-secondary {
    background: rgba(255,255,255,.07);
    color: rgba(255,255,255,.8);
    border: 1px solid rgba(255,255,255,.1);
  }
  .menu-btn-secondary .btn-icon { background: rgba(255,255,255,.1); }
  .menu-btn-secondary .btn-icon svg { stroke: rgba(255,255,255,.7); }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-icon svg { width: 20px; height: 20px; }
  .btn-text { flex: 1; text-align: left; }
  .btn-arrow { opacity: .3; flex-shrink: 0; }
  .btn-arrow svg { width: 16px; height: 16px; stroke: currentColor; }

  .divider {
    height: 1px;
    background: rgba(255,255,255,.06);
    margin: 2px 0;
  }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 11h1a3 3 0 0 1 0 6h-1"/>
      <path d="M9 12v6"/><path d="M13 12v6"/>
      <path d="M14 7.5c-1 0-1.44.5-3 .5s-2-.5-3-.5-1.44.5-3 .5"/>
      <path d="M3 7.5V17a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3V7.5"/>
      <path d="M5 7.5c0-1.5.5-3 3.5-3s3 2 5 2 2.5-2 4-2"/>
    </svg>
  </div>
  <div class="brand-name">Mise</div>
  <div class="brand-sub">Restaurant Management</div>
</div>

<div class="time-display">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
  <span id="timeDisplay"></span>
</div>

<nav class="menu">
  <a href="/clock" class="menu-btn menu-btn-primary">
    <div class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <span class="btn-text">Clock In / Clock Out</span>
    <span class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </span>
  </a>

  <div class="divider"></div>

  <a href="/join" class="menu-btn menu-btn-secondary">
    <div class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
    </div>
    <span class="btn-text">Submit Your Details</span>
    <span class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </span>
  </a>

  <a href="/dashboard" class="menu-btn menu-btn-secondary">
    <div class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect width="7" height="7" x="3" y="3" rx="1"/>
        <rect width="7" height="7" x="14" y="3" rx="1"/>
        <rect width="7" height="7" x="3" y="14" rx="1"/>
        <rect width="7" height="7" x="14" y="14" rx="1"/>
      </svg>
    </div>
    <span class="btn-text">Manager Dashboard</span>
    <span class="btn-arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </span>
  </a>
</nav>

<script>
function tick() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', hour12: true });
  const date = now.toLocaleDateString('en-SG', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('timeDisplay').textContent = `${time} · ${date}`;
}
tick();
setInterval(tick, 15000);
</script>
</body>
</html>
