<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Mise — MAIse Knowledge Base</title>
<style>
:root{--ink:#1A2318;--accent:#3D5240;--surface:#F0F2EC;--white:#fff;--ink-60:rgba(26,35,24,.6);--ink-30:rgba(26,35,24,.3);--ink-08:rgba(26,35,24,.08);--font:'Inter',sans-serif;--font-display:'DM Serif Display',serif;--danger:#C0392B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);display:flex;min-height:100vh;font-size:13px}
.sidebar{width:216px;background:#1A2318;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:9px}
.sb-icon{width:28px;height:28px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.sb-icon span{font-family:var(--font-display);font-size:16px;color:#fff;font-style:italic}
.sb-name{font-size:15px;font-weight:400;color:#fff;font-family:var(--font-display)}
.sb-nav{padding:8px;flex:1}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;color:rgba(255,255,255,.45);text-decoration:none;font-size:12.5px;font-weight:500;margin-bottom:1px}
.sb-nav a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.sb-nav a.active{color:#fff;background:rgba(255,255,255,.09)}
.sb-nav a svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.3);font-size:11.5px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:6px}
.main{flex:1;padding:28px 32px;min-width:0}
.page-title{font-size:22px;font-weight:400;font-family:var(--font-display);color:var(--ink)}
.page-sub{font-size:12.5px;color:var(--ink-60);margin-top:3px;margin-bottom:20px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.cat-filter{height:32px;padding:0 12px;border:1px solid var(--ink-08);border-radius:8px;font-size:12.5px;font-family:var(--font);outline:none;background:var(--white)}
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;transition:opacity .12s}
.btn-primary{background:var(--accent);color:#fff}
.btn:hover{opacity:.85}
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.kb-card{background:var(--white);border-radius:12px;border:1px solid var(--ink-08);padding:16px}
.kb-cat{font-size:10px;font-weight:600;color:var(--ink-30);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kb-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:8px}
.kb-content{font-size:12.5px;color:var(--ink-60);line-height:1.5;white-space:pre-wrap;max-height:120px;overflow:hidden;position:relative}
.kb-content.expanded{max-height:none}
.kb-fade{position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(transparent,var(--white))}
.kb-actions{display:flex;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid var(--ink-08)}
.btn-sm{height:26px;padding:0 10px;border-radius:6px;font-size:11.5px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid var(--ink-08);background:var(--surface);color:var(--ink-60)}
.btn-danger{color:var(--danger);border-color:rgba(192,57,43,.2);background:rgba(192,57,43,.06)}
.empty{text-align:center;padding:48px;color:var(--ink-60)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,35,24,.4);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--white);border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:24px}
.modal-title{font-size:17px;font-weight:400;font-family:var(--font-display);color:var(--ink);margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--ink-08);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--ink);outline:none;background:var(--surface)}
.fg textarea{min-height:160px;resize:vertical;line-height:1.5}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--ink-08)}
.alert{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:12px;display:none}
.alert-ok{background:#F0FDF4;color:#2E6B3E;border:1px solid rgba(46,107,62,.2)}
.alert-err{background:#FEF2F2;color:var(--danger);border:1px solid rgba(192,57,43,.2)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-icon"><span>M</span></div>
    <div class="sb-name">Mise</div>
  </div>
  <nav class="sb-nav">
    <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>Dashboard</a>
    <a href="/staff"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Staff</a>
    <a href="/maise-kb" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>MAIse KB</a>
  </nav>
  <div class="sb-footer">
    <button class="sb-logout" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-title">MAIse Knowledge Base</div>
  <div class="page-sub">Add information MAIse can reference — recipes, suppliers, SOPs, brand info</div>

  <div id="alertBox" class="alert"></div>

  <div class="toolbar">
    <select class="cat-filter" id="catFilter" onchange="loadKB()">
      <option value="">All categories</option>
    </select>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add entry
    </button>
    <a href="/maise" style="color:var(--accent);font-size:12.5px;text-decoration:none;margin-left:auto">Open MAIse →</a>
  </div>

  <div class="kb-grid" id="kbGrid">
    <div class="empty">Loading…</div>
  </div>
</main>

<!-- Add/Edit modal -->
<div class="overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add knowledge base entry</div>
    <input type="hidden" id="editId">
    <div class="fg">
      <label>Category</label>
      <select id="fCategory"></select>
    </div>
    <div class="fg">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="e.g. Clam Chowder Recipe, Disposables Supplier">
    </div>
    <div class="fg">
      <label>Content</label>
      <textarea id="fContent" placeholder="Enter the full information MAIse should know…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" style="background:var(--surface);color:var(--ink-60);border:1px solid var(--ink-08)" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEntry()">Save entry</button>
    </div>
  </div>
</div>

<script>
let categories = [];

async function init() {
  const r = await fetch('/api/maise-kb/categories');
  categories = await r.json();
  const catSel = document.getElementById('catFilter');
  const fCat = document.getElementById('fCategory');
  categories.forEach(c => {
    catSel.innerHTML += `<option value="${c}">${c}</option>`;
    fCat.innerHTML += `<option value="${c}">${c}</option>`;
  });
  loadKB();
}

async function loadKB() {
  const cat = document.getElementById('catFilter').value;
  const url = '/api/maise-kb' + (cat ? '?category=' + encodeURIComponent(cat) : '');
  const r = await fetch(url);
  const entries = await r.json();
  const grid = document.getElementById('kbGrid');
  if (!entries.length) {
    grid.innerHTML = '<div class="empty">No entries yet. Add your first knowledge base entry.</div>';
    return;
  }
  grid.innerHTML = entries.map(e => `
    <div class="kb-card">
      <div class="kb-cat">${e.category}</div>
      <div class="kb-title">${e.title}</div>
      <div class="kb-content" id="kbc-${e.id}">${e.content.replace(/</g,'&lt;')}</div>
      <div class="kb-actions">
        <button class="btn-sm" onclick="toggleExpand(${e.id})">Expand</button>
        <button class="btn-sm" onclick="editEntry(${e.id},'${e.category.replace(/'/g,"\\'")}','${e.title.replace(/'/g,"\\'")}',\`${e.content.replace(/`/g,'\\`')}\`)">Edit</button>
        <button class="btn-sm btn-danger" onclick="deleteEntry(${e.id})">Delete</button>
      </div>
    </div>`).join('');
}

function toggleExpand(id) {
  const el = document.getElementById('kbc-' + id);
  el.classList.toggle('expanded');
}

function openModal(id='', cat='', title='', content='') {
  document.getElementById('editId').value = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit entry' : 'Add knowledge base entry';
  document.getElementById('fCategory').value = cat || categories[0];
  document.getElementById('fTitle').value = title;
  document.getElementById('fContent').value = content;
  document.getElementById('modalOverlay').classList.add('open');
}

function editEntry(id, cat, title, content) { openModal(id, cat, title, content); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

async function saveEntry() {
  const id = document.getElementById('editId').value;
  const body = {
    category: document.getElementById('fCategory').value,
    title: document.getElementById('fTitle').value.trim(),
    content: document.getElementById('fContent').value.trim()
  };
  if (!body.title || !body.content) { showAlert('Please fill in all fields', 'err'); return; }
  const method = id ? 'PUT' : 'POST';
  const url = id ? '/api/maise-kb/' + id : '/api/maise-kb';
  const r = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d = await r.json();
  if (d.success) { closeModal(); showAlert('Saved', 'ok'); loadKB(); }
  else showAlert(d.error || 'Error', 'err');
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const r = await fetch('/api/maise-kb/' + id, { method: 'DELETE' });
  const d = await r.json();
  if (d.success) { showAlert('Deleted', 'ok'); loadKB(); }
}

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function logout() { await fetch('/api/auth/logout', {method:'POST'}); location.href='/login'; }

fetch('/api/me').then(r => { if (!r.ok) location.href='/login'; }).catch(() => location.href='/login');
init();
</script>
</body>
</html>
