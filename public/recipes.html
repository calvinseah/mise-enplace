<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Mise — Recipes</title>
<style>
:root{--ink:#1A2318;--green:#3D5240;--green-d:#2A3B2D;--surface:#F0F2EC;--card:#fff;--ink-60:rgba(26,35,24,.6);--ink-30:rgba(26,35,24,.3);--ink-08:rgba(26,35,24,.08);--font:'Inter',sans-serif;--font-d:'DM Serif Display',serif;--danger:#C0392B}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--green-d);color:var(--ink)}

/* Layout */
.screen{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--surface)}

/* Header */
.header{background:var(--green-d);padding:max(14px,env(safe-area-inset-top)) 18px 14px;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-title{font-family:var(--font-d);font-size:22px;color:#fff}
.add-btn{height:32px;padding:0 14px;border-radius:20px;background:rgba(255,255,255,.15);color:#fff;font-size:12px;font-weight:600;font-family:var(--font);border:none;cursor:pointer;display:none}
.search-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border-radius:12px;padding:10px 14px}
.search-bar svg{flex-shrink:0;opacity:.4}
.search-bar input{background:none;border:none;outline:none;font-family:var(--font);font-size:13px;color:#fff;flex:1}
.search-bar input::placeholder{color:rgba(255,255,255,.35)}

/* Filters */
.filters{background:var(--surface);flex-shrink:0}
.cat-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:10px 14px}
.cat-row::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;height:28px;padding:0 14px;border-radius:20px;border:1.5px solid var(--ink-08);background:transparent;color:var(--ink-60);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all .12s}
.ctab.active{background:var(--green-d);border-color:var(--green-d);color:#fff}

/* Recipe list */
.recipe-list{flex:1;overflow-y:auto;padding:10px 14px;-webkit-overflow-scrolling:touch}
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.recipe-card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--ink-08);cursor:pointer;transition:transform .1s}
.recipe-card:active{transform:scale(.97)}
.recipe-thumb{height:90px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#E8F0E3,#C8D5B9)}
.recipe-body{padding:10px 11px 12px}
.recipe-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.3}
.recipe-meta{font-size:11px;color:var(--ink-60)}
.recipe-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:10px}
.tag-shared{background:#F0FDF4;color:#2E6B3E}
.tag-outlet{background:#EFF6FF;color:#1D4ED8}
.tag-allergen{background:#FEF3C7;color:#92400E}
.empty{text-align:center;padding:48px 16px;color:var(--ink-60);font-size:13px}

/* Detail panel */
.detail{position:fixed;inset:0;background:var(--surface);z-index:100;display:none;flex-direction:column;max-width:480px;margin:0 auto}
.detail.open{display:flex}
.detail-hero{height:160px;display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,#E8F0E3,#C8D5B9);flex-shrink:0;position:relative}
.detail-back{position:absolute;top:max(14px,env(safe-area-inset-top));left:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.2);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.detail-edit-btn{position:absolute;top:max(14px,env(safe-area-inset-top));right:14px;height:30px;padding:0 12px;border-radius:20px;background:rgba(0,0,0,.2);border:none;color:#fff;font-size:12px;font-family:var(--font);cursor:pointer;display:none}
.detail-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.detail-name{font-family:var(--font-d);font-size:24px;color:var(--ink);margin-bottom:3px}
.detail-sub{font-size:12px;color:var(--ink-60);margin-bottom:10px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}

/* Scale control */
.scale-card{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:16px;border:1px solid var(--ink-08)}
.scale-label{font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.scale-row{display:flex;align-items:center;gap:10px}
.scale-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--ink-08);background:var(--surface);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink)}
.scale-val{font-size:18px;font-weight:400;font-family:var(--font-d);color:var(--ink);min-width:36px;text-align:center}
.scale-sub{font-size:12px;color:var(--ink-60)}
.cost-chip{margin-left:auto;background:#F0FDF4;border:1px solid rgba(46,107,62,.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:#2E6B3E}

/* Sections */
.sec{margin-bottom:18px}
.sec-title{font-size:11px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.ing-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--ink-08)}
.ing-name{font-size:13px;font-weight:500;color:var(--ink)}
.ing-qty{font-size:15px;font-weight:400;font-family:var(--font-d);color:var(--green)}
.step-item{display:flex;gap:10px;margin-bottom:12px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-body{}
.step-title{font-size:12px;font-weight:600;color:var(--ink-60);margin-bottom:3px}
.step-text{font-size:13px;color:var(--ink);line-height:1.5}
.allergen-pills{display:flex;gap:6px;flex-wrap:wrap}
.allergen{background:#FEF3C7;color:#92400E;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500}
.notes-box{background:var(--card);border-radius:10px;padding:12px;font-size:12.5px;color:var(--ink-60);line-height:1.5;border:1px solid var(--ink-08)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,35,24,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.modal-title{font-family:var(--font-d);font-size:18px;color:var(--ink);margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1px solid var(--ink-08);border-radius:10px;font-size:13px;font-family:var(--font);color:var(--ink);outline:none;background:var(--card)}
.fg textarea{min-height:80px;resize:vertical;line-height:1.5}
.ing-editor,.step-editor{background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--ink-08);margin-bottom:8px}
.ing-row-edit{display:flex;gap:6px;align-items:center}
.ing-row-edit input{flex:1;padding:7px 10px;border:1px solid var(--ink-08);border-radius:8px;font-size:12.5px;font-family:var(--font);color:var(--ink);outline:none;background:var(--surface)}
.remove-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(192,57,43,.1);color:var(--danger);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.add-row-btn{height:32px;padding:0 14px;border-radius:8px;border:1.5px dashed var(--ink-08);background:transparent;color:var(--ink-60);font-size:12px;font-family:var(--font);cursor:pointer;width:100%;margin-top:4px}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.btn{height:40px;padding:0 18px;border-radius:10px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none}
.btn-primary{background:var(--green);color:#fff;flex:1}
.btn-ghost{background:var(--surface);color:var(--ink-60);border:1px solid var(--ink-08)}
.btn-danger-sm{height:28px;padding:0 12px;border-radius:6px;font-size:12px;font-family:var(--font);cursor:pointer;border:none;background:rgba(192,57,43,.08);color:var(--danger)}

/* Back link for desktop */
.back-to-admin{display:none}
@media(min-width:481px){
  body{background:var(--surface)}
  .screen{max-width:100%;flex-direction:row;height:100vh}
  .sidebar-wrap{width:216px;background:#1A2318;flex-shrink:0;display:flex;flex-direction:column}
  .main-wrap{flex:1;display:flex;flex-direction:column;min-width:0;max-width:480px;border-right:1px solid var(--ink-08)}
  .header{background:var(--green-d)}
}
</style>
</head>
<body>
<div class="screen">
  <!-- Sidebar (desktop only) -->
  <div class="sidebar-wrap" id="sidebarWrap" style="display:none">
    <div style="padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:9px">
      <div style="width:28px;height:28px;background:#3D5240;border-radius:10px;display:flex;align-items:center;justify-content:center"><span style="font-family:'DM Serif Display',serif;font-size:16px;color:#fff;font-style:italic">M</span></div>
      <div style="font-size:15px;font-weight:400;color:#fff;font-family:'DM Serif Display',serif">Mise</div>
    </div>
    <nav style="padding:8px;flex:1" id="sidebarNav"></nav>
  </div>

  <div class="main-wrap" id="mainWrap">
    <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="header-title">Recipe Book</div>
        <button class="add-btn" id="addBtn" onclick="openAddModal()">+ Add recipe</button>
      </div>
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" placeholder="Search recipes or ingredients…" oninput="filterRecipes()">
      </div>
    </div>

    <!-- Category filter -->
    <div class="filters">
      <div class="cat-row" id="catRow">
        <button class="ctab active" onclick="filterCat('')" data-cat="">All</button>
      </div>
    </div>

    <!-- Recipe grid -->
    <div class="recipe-list">
      <div class="recipe-grid" id="recipeGrid">
        <div class="empty" style="grid-column:1/-1">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- Recipe detail -->
<div class="detail" id="detailPanel">
  <div class="detail-hero" id="detailHero">
    <button class="detail-back" onclick="closeDetail()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="detailIcon" style="font-size:72px">🍽️</span>
    <button class="detail-edit-btn" id="detailEditBtn" onclick="editCurrent()">Edit</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Add/Edit modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add recipe</div>
    <input type="hidden" id="editRecipeId">
    <div class="fg"><label>Name</label><input id="fName" placeholder="e.g. Tiramisu — Original"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label>Category</label><select id="fCategory"></select></div>
      <div class="fg"><label>Icon (emoji)</label><input id="fIcon" placeholder="🍽️" maxlength="4"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label>Outlet</label><select id="fOutlet"><option value="">Shared (all outlets)</option></select></div>
      <div class="fg"><label>Base servings</label><input id="fServings" type="number" min="1" value="4"></div>
    </div>
    <div class="fg"><label>Description</label><input id="fDesc" placeholder="Short description…"></div>
    <div class="fg"><label>Allergens</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0" id="allergenChecks"></div>
    </div>

    <div class="fg"><label>Ingredients</label>
      <div id="ingList"></div>
      <button class="add-row-btn" onclick="addIngRow()">+ Add ingredient</button>
    </div>

    <div class="fg"><label>Steps</label>
      <div id="stepList"></div>
      <button class="add-row-btn" onclick="addStepRow()">+ Add step</button>
    </div>

    <div class="fg"><label>Notes</label><textarea id="fNotes" placeholder="Tips, variations, storage…"></textarea></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Save recipe</button>
    </div>
  </div>
</div>

<script>
const ALLERGENS = ['Gluten','Dairy','Eggs','Nuts','Shellfish','Fish','Soy','Sesame','Caffeine'];
let allRecipes = [], categories = [], outlets = [], currentRecipe = null, currentServings = 4, isAdmin = false;

async function init() {
  // Check auth
  try {
    const me = await fetch('/api/me').then(r=>r.ok?r.json():null);
    if (me) {
      isAdmin = me.role === 'admin';
      document.getElementById('addBtn').style.display = 'flex';
      document.getElementById('detailEditBtn').style.display = 'block';
      // Show sidebar on desktop
      if (window.innerWidth > 480) {
        document.getElementById('sidebarWrap').style.display = 'flex';
        buildSidebar(me);
      }
    }
  } catch(e) {}

  // Load categories
  categories = await fetch('/api/recipes/categories').then(r=>r.json());
  const catRow = document.getElementById('catRow');
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'ctab';
    btn.setAttribute('data-cat', c);
    btn.textContent = c;
    btn.onclick = () => filterCat(c);
    catRow.appendChild(btn);
  });

  // Load outlets
  outlets = await fetch('/api/outlets').then(r=>r.json()).catch(()=>[]);
  const fOutlet = document.getElementById('fOutlet');
  outlets.forEach(o => {
    fOutlet.innerHTML += '<option value="'+o.id+'">'+o.name+'</option>';
  });

  // Load categories in form
  const fCat = document.getElementById('fCategory');
  categories.forEach(c => { fCat.innerHTML += '<option value="'+c+'">'+c+'</option>'; });

  // Allergen checkboxes
  const ac = document.getElementById('allergenChecks');
  ALLERGENS.forEach(a => {
    ac.innerHTML += '<label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer"><input type="checkbox" value="'+a+'"> '+a+'</label>';
  });

  await loadRecipes();
}

async function loadRecipes() {
  allRecipes = await fetch('/api/recipes').then(r=>r.json());
  renderRecipes(allRecipes);
}

function renderRecipes(list) {
  const grid = document.getElementById('recipeGrid');
  if (!list.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No recipes yet. Add the first one!</div>'; return; }
  grid.innerHTML = list.map(r => {
    const tags = [];
    if (r.is_shared) tags.push('<span class="tag tag-shared">Shared</span>');
    else if (r.outlet_name) tags.push('<span class="tag tag-outlet">'+r.outlet_name+'</span>');
    const allergens = JSON.parse(r.allergens||'[]');
    if (allergens.length) tags.push('<span class="tag tag-allergen">'+allergens.slice(0,2).join(', ')+'</span>');
    return '<div class="recipe-card" onclick="openRecipe('+r.id+')">' +
      '<div class="recipe-thumb">'+r.icon+'</div>' +
      '<div class="recipe-body">' +
        '<div class="recipe-name">'+r.name+'</div>' +
        '<div class="recipe-meta">'+r.base_servings+' portions</div>' +
        (tags.length ? '<div class="recipe-tags">'+tags.join('')+'</div>' : '') +
      '</div></div>';
  }).join('');
}

let currentCat = '', currentQ = '';
function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.ctab').forEach(b => b.classList.toggle('active', b.getAttribute('data-cat') === cat));
  applyFilters();
}
function filterRecipes() { currentQ = document.getElementById('searchInput').value.toLowerCase(); applyFilters(); }
function applyFilters() {
  let list = allRecipes;
  if (currentCat) list = list.filter(r => r.category === currentCat);
  if (currentQ)   list = list.filter(r => r.name.toLowerCase().includes(currentQ));
  renderRecipes(list);
}

async function openRecipe(id) {
  const r = await fetch('/api/recipes/'+id).then(res=>res.json());
  currentRecipe = r;
  currentServings = r.base_servings;
  document.getElementById('detailIcon').textContent = r.icon;
  document.getElementById('detailEditBtn').setAttribute('data-id', id);
  renderDetail(r, currentServings);
  document.getElementById('detailPanel').classList.add('open');
}

function renderDetail(r, servings) {
  const ratio = servings / r.base_servings;
  const allergens = r.allergens || [];
  const totalCost = r.ingredients.reduce((s,i) => s + (i.amount * ratio * (i.cost_per_unit||0)), 0);

  let html = '<div class="detail-name">'+r.name+'</div>';
  html += '<div class="detail-sub">'+(r.is_shared?'Shared recipe':'Outlet: '+r.outlet_name)+' · '+r.category+'</div>';
  const tags = [];
  if (r.is_shared) tags.push('<span class="tag tag-shared">Shared</span>');
  allergens.forEach(a => tags.push('<span class="tag tag-allergen">'+a+'</span>'));
  if (tags.length) html += '<div class="detail-tags">'+tags.join('')+'</div>';

  // Scale control
  html += '<div class="scale-card"><div class="scale-label">Portions</div><div class="scale-row">' +
    '<button class="scale-btn" onclick="changeServings(-1)">−</button>' +
    '<div class="scale-val" id="scaleVal">'+servings+'</div>' +
    '<div class="scale-sub">portions</div>' +
    '<button class="scale-btn" onclick="changeServings(1)">+</button>' +
    (totalCost > 0 ? '<div class="cost-chip" id="costChip">$'+totalCost.toFixed(2)+' total</div>' : '') +
    '</div></div>';

  // Ingredients
  if (r.ingredients.length) {
    html += '<div class="sec"><div class="sec-title">Ingredients</div>';
    r.ingredients.forEach(ing => {
      const qty = ing.amount * ratio;
      const display = qty % 1 === 0 ? qty.toFixed(0) : qty.toFixed(1);
      const unit = ing.unit || '';
      html += '<div class="ing-row"><div class="ing-name">'+ing.name+'</div><div class="ing-qty" data-base="'+ing.amount+'" data-unit="'+unit+'">'+display+(unit?' '+unit:'')+'</div></div>';
    });
    html += '</div>';
  }

  // Steps
  if (r.steps.length) {
    html += '<div class="sec"><div class="sec-title">Method</div>';
    r.steps.forEach((step, i) => {
      html += '<div class="step-item"><div class="step-num">'+(i+1)+'</div><div class="step-body"><div class="step-title">'+step.title+'</div><div class="step-text">'+step.content+'</div></div></div>';
    });
    html += '</div>';
  }

  // Allergens
  if (allergens.length) {
    html += '<div class="sec"><div class="sec-title">Allergens</div><div class="allergen-pills">';
    allergens.forEach(a => { html += '<span class="allergen">'+a+'</span>'; });
    html += '</div></div>';
  }

  // Notes
  if (r.notes) html += '<div class="sec"><div class="sec-title">Notes</div><div class="notes-box">'+r.notes+'</div></div>';

  // Admin delete
  if (isAdmin) html += '<div style="margin-top:8px"><button class="btn-danger-sm" onclick="deleteRecipe('+r.id+')">Delete recipe</button></div>';

  html += '<div style="height:32px"></div>';
  document.getElementById('detailBody').innerHTML = html;
}

function changeServings(delta) {
  currentServings = Math.max(1, currentServings + delta);
  document.getElementById('scaleVal').textContent = currentServings;
  const ratio = currentServings / currentRecipe.base_servings;
  // Update quantities
  document.querySelectorAll('.ing-qty').forEach(el => {
    const base = parseFloat(el.getAttribute('data-base'));
    const unit = el.getAttribute('data-unit');
    const qty = base * ratio;
    const display = qty % 1 === 0 ? qty.toFixed(0) : qty.toFixed(1);
    el.textContent = display + (unit ? ' '+unit : '');
  });
  // Update cost
  const totalCost = currentRecipe.ingredients.reduce((s,i) => s + (i.amount * ratio * (i.cost_per_unit||0)), 0);
  const chip = document.getElementById('costChip');
  if (chip) chip.textContent = '$'+totalCost.toFixed(2)+' total';
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); currentRecipe = null; }

// Modal
function openAddModal() {
  document.getElementById('editRecipeId').value = '';
  document.getElementById('modalTitle').textContent = 'Add recipe';
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fIcon').value = '';
  document.getElementById('fServings').value = 4;
  document.getElementById('fNotes').value = '';
  document.getElementById('fCategory').selectedIndex = 0;
  document.getElementById('fOutlet').selectedIndex = 0;
  document.querySelectorAll('#allergenChecks input').forEach(c => c.checked = false);
  document.getElementById('ingList').innerHTML = '';
  document.getElementById('stepList').innerHTML = '';
  addIngRow(); addStepRow();
  document.getElementById('modalOverlay').classList.add('open');
}

function editCurrent() {
  if (!currentRecipe) return;
  const r = currentRecipe;
  document.getElementById('editRecipeId').value = r.id;
  document.getElementById('modalTitle').textContent = 'Edit recipe';
  document.getElementById('fName').value = r.name;
  document.getElementById('fDesc').value = r.description||'';
  document.getElementById('fIcon').value = r.icon||'';
  document.getElementById('fServings').value = r.base_servings;
  document.getElementById('fNotes').value = r.notes||'';
  document.getElementById('fCategory').value = r.category;
  document.getElementById('fOutlet').value = r.outlet_id||'';
  document.querySelectorAll('#allergenChecks input').forEach(c => { c.checked = r.allergens.includes(c.value); });
  document.getElementById('ingList').innerHTML = '';
  r.ingredients.forEach(i => addIngRow(i));
  document.getElementById('stepList').innerHTML = '';
  r.steps.forEach(s => addStepRow(s));
  document.getElementById('modalOverlay').classList.add('open');
}

function addIngRow(ing={}) {
  const div = document.createElement('div');
  div.className = 'ing-editor';
  div.innerHTML = '<div class="ing-row-edit">' +
    '<input placeholder="Ingredient" value="'+(ing.name||'')+'" class="ing-name-f" style="flex:2">' +
    '<input placeholder="Qty" type="number" value="'+(ing.amount||'')+'" class="ing-amt-f" style="flex:1;max-width:70px">' +
    '<input placeholder="Unit" value="'+(ing.unit||'')+'" class="ing-unit-f" style="flex:1;max-width:60px">' +
    '<input placeholder="$/unit" type="number" step="0.01" value="'+(ing.cost_per_unit||'')+'" class="ing-cost-f" style="flex:1;max-width:70px">' +
    '<button class="remove-btn" onclick="this.closest(\'.ing-editor\').remove()">×</button>' +
    '</div>';
  document.getElementById('ingList').appendChild(div);
}

function addStepRow(step={}) {
  const div = document.createElement('div');
  div.className = 'step-editor';
  div.innerHTML = '<input placeholder="Step title" value="'+(step.title||'')+'" class="step-title-f" style="width:100%;padding:7px 10px;border:1px solid var(--ink-08);border-radius:8px;font-size:12.5px;font-family:var(--font);outline:none;background:var(--surface);margin-bottom:6px">' +
    '<textarea placeholder="Step instructions…" class="step-content-f" style="width:100%;padding:7px 10px;border:1px solid var(--ink-08);border-radius:8px;font-size:12.5px;font-family:var(--font);outline:none;background:var(--surface);min-height:60px;resize:vertical">'+(step.content||'')+'</textarea>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-top:6px">' +
    '<input placeholder="Timer (seconds, optional)" type="number" value="'+(step.timer_seconds||'')+'" class="step-timer-f" style="flex:1;padding:6px 10px;border:1px solid var(--ink-08);border-radius:8px;font-size:12px;font-family:var(--font);outline:none;background:var(--surface)">' +
    '<button class="remove-btn" onclick="this.closest(\'.step-editor\').remove()">×</button>' +
    '</div>';
  document.getElementById('stepList').appendChild(div);
}

async function saveRecipe() {
  const id = document.getElementById('editRecipeId').value;
  const allergens = [...document.querySelectorAll('#allergenChecks input:checked')].map(c=>c.value);
  const ingredients = [...document.querySelectorAll('.ing-editor')].map(d => ({
    name: d.querySelector('.ing-name-f').value.trim(),
    amount: parseFloat(d.querySelector('.ing-amt-f').value)||0,
    unit: d.querySelector('.ing-unit-f').value.trim()||null,
    cost_per_unit: parseFloat(d.querySelector('.ing-cost-f').value)||0
  })).filter(i=>i.name);
  const steps = [...document.querySelectorAll('.step-editor')].map(d => ({
    title: d.querySelector('.step-title-f').value.trim(),
    content: d.querySelector('.step-content-f').value.trim(),
    timer_seconds: parseInt(d.querySelector('.step-timer-f').value)||null
  })).filter(s=>s.title&&s.content);
  const body = {
    name: document.getElementById('fName').value.trim(),
    category: document.getElementById('fCategory').value,
    outlet_id: document.getElementById('fOutlet').value||null,
    description: document.getElementById('fDesc').value.trim(),
    icon: document.getElementById('fIcon').value.trim() || null,
    base_servings: parseInt(document.getElementById('fServings').value)||4,
    allergens, notes: document.getElementById('fNotes').value.trim(),
    is_shared: !document.getElementById('fOutlet').value,
    ingredients, steps
  };
  if (!body.name) { alert('Recipe name is required'); return; }
  const method = id ? 'PUT' : 'POST';
  const url = id ? '/api/recipes/'+id : '/api/recipes';
  const r = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  const d = await r.json();
  if (d.success) { closeModal(); await loadRecipes(); if (id) { closeDetail(); } }
  else alert(d.error||'Error saving recipe');
}

async function deleteRecipe(id) {
  if (!confirm('Delete this recipe?')) return;
  const r = await fetch('/api/recipes/'+id, {method:'DELETE'});
  const d = await r.json();
  if (d.success) { closeDetail(); await loadRecipes(); }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    ['Companies','/companies'],['Labour Cost','/labour-cost'],

  ];

    '<a href="/recipes" style="display:block;padding:7px 9px;border-radius:10px;color:#fff;background:rgba(255,255,255,.09);text-decoration:none;font-size:12.5px;margin-bottom:1px">Recipe Book</a>';
}
