<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mise — Companies</title>
<style>
:root{--ink:#1A2318;--accent:#3D5240;--surface:#F0F2EC;--ink-60:rgba(26,35,24,.60);--ink-30:rgba(26,35,24,.30);--ink-08:rgba(26,35,24,.08);--white:#ffffff;--font:'Inter',sans-serif;--font-display:'DM Serif Display',serif;--danger:#C0392B;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);display:flex;min-height:100vh;font-size:13px}
.sidebar{width:216px;background:#1A2318;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-logo-row{display:flex;align-items:center;gap:9px}
.sb-icon{width:28px;height:28px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center}
.sb-icon span{font-family:var(--font-display);font-size:16px;color:#fff;line-height:1;font-style:italic}
.sb-name{font-size:15px;font-weight:400;color:#fff;font-family:var(--font-display)}
.sb-addr{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.sb-nav{padding:8px;flex:1}
.sb-nav a{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:10px;color:rgba(255,255,255,.45);text-decoration:none;font-size:12.5px;font-weight:500;transition:all .12s;margin-bottom:1px}
.sb-nav a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.sb-nav a.active{color:#fff;background:rgba(255,255,255,.09)}
.sb-nav a svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06)}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.3);font-size:11.5px;font-family:var(--font);cursor:pointer;padding:0;display:flex;align-items:center;gap:6px}
.sb-logout svg{width:13px;height:13px}
.main{flex:1;padding:28px 32px;min-width:0}
.page-title{font-size:22px;font-weight:400;color:var(--ink);font-family:var(--font-display)}
.page-sub{font-size:12.5px;color:var(--ink-60);margin-top:3px;margin-bottom:24px}
.card{background:var(--white);border-radius:16px;border:1px solid var(--ink-08);overflow:hidden;margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--ink-08);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:var(--ink)}
.company-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--ink-08)}
.company-row:last-child{border-bottom:none}
.company-name{font-size:13.5px;font-weight:600;color:var(--ink);flex:1}
.company-uen{font-size:12px;color:var(--ink-60);font-family:monospace;min-width:120px}
.btn{height:32px;padding:0 14px;border-radius:8px;border:none;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn svg{width:13px;height:13px}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--ink-60);border:1px solid var(--ink-08)}.btn-ghost:hover{background:#f5f5f3}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(192,57,43,.2)}.btn-danger:hover{background:rgba(192,57,43,.05)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em}
.fg input{height:36px;padding:0 12px;border:1px solid var(--ink-08);border-radius:8px;font-size:13px;color:var(--ink);background:var(--white);font-family:var(--font);outline:none}
.fg input:focus{border-color:var(--accent)}
.add-form{display:flex;gap:10px;align-items:flex-end;padding:16px 20px;border-bottom:1px solid var(--ink-08)}
.alert{padding:10px 14px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:16px;border:1px solid;display:none}
.alert-ok{background:rgba(46,107,62,.08);color:#2E6B3E;border-color:rgba(46,107,62,.2)}
.alert-err{background:rgba(192,57,43,.08);color:var(--danger);border-color:rgba(192,57,43,.2)}
.empty{text-align:center;color:var(--ink-60);padding:32px;font-size:13px}
.edit-inline{display:flex;align-items:center;gap:8px;flex:1}
.edit-inline input{height:30px;padding:0 10px;border:1px solid var(--ink-08);border-radius:7px;font-size:13px;font-family:var(--font);outline:none;color:var(--ink)}
.edit-inline input:focus{border-color:var(--accent)}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo">
    <a href="/" style="display:flex;align-items:center;gap:9px;text-decoration:none">
      <div class="sb-icon"><span>M</span></div>
      <div><div class="sb-name">Mise</div><div class="sb-addr">Every person, in place.</div></div>
    </a>
  </div>
    <nav class="sb-nav">
    <a href="/dashboard" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>Dashboard</a>
    <a href="/staff" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Staff</a>
    <a href="/applications" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Applications</a>
    <a href="/roster" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Roster</a>
    <a href="/payslip"  data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Payslip</a>
    <a href="/payroll-summary"  data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Payroll</a>
    <a href="/companies" class="active" data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Companies</a>
    <a href="/labour-cost" ><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Labour Cost</a>
    <a href="/audit"  data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Audit Log</a>
    <a href="/maise-kb"  data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>MAIse KB</a>
    <a href="/users"  data-admin-only="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
    <a href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></svg>Clock-in page</a>
  </nav>
  <div class="sb-footer">
    <button class="sb-logout" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</aside>

<main class="main">
  <div class="page-title">Companies</div>
  <div class="page-sub">TBHG legal entities for payroll exports</div>

  <div id="alertBox" class="alert"></div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Add company</div>
    </div>
    <div class="add-form">
      <div class="fg" style="flex:2">
        <label>Company name</label>
        <input type="text" id="newName" placeholder="e.g. Tipo Private Limited">
      </div>
      <div class="fg" style="flex:1">
        <label>UEN</label>
        <input type="text" id="newUen" placeholder="e.g. 201830614K" maxlength="12">
      </div>
      <button class="btn btn-primary" onclick="addCompany()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>
  </div>

  <div class="card" id="companiesCard">
    <div class="empty">Loading…</div>
  </div>
</main>

<script>
async function load() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { location.href='/login'; return; }
    const u = await r.json();
    if (u.role !== 'admin') { location.href='/dashboard'; return; }
  } catch(e) { location.href='/login'; return; }
  loadCompanies();
}

async function loadCompanies() {
  try {
    const r = await fetch('/api/companies');
    const companies = await r.json();
    const el = document.getElementById('companiesCard');
    if (!companies.length) {
      el.innerHTML = '<div class="empty">No companies yet. Add your first one above.</div>';
      return;
    }
    el.innerHTML = companies.map(c => `
      <div class="company-row" id="crow-${c.id}">
        <div class="company-name">${c.name}</div>
        <div class="company-uen">${c.uen || '<span style="color:var(--ink-30)">No UEN</span>'}</div>
        <button class="btn btn-ghost" style="margin-left:auto" onclick="editRow(${c.id},'${c.name.replace(/'/g,"\\'")}','${(c.uen||'').replace(/'/g,"\\'")}')">Edit</button>
        <button class="btn btn-danger" onclick="deleteCompany(${c.id},'${c.name.replace(/'/g,"\\'")}')">Delete</button>
      </div>`).join('');
  } catch(e) { showAlert('Error loading companies', 'err'); }
}

function editRow(id, name, uen) {
  const row = document.getElementById('crow-' + id);
  row.innerHTML = `
    <div class="edit-inline">
      <input type="text" id="ename-${id}" value="${name}" style="flex:2">
      <input type="text" id="euen-${id}" value="${uen}" placeholder="UEN" style="flex:1" maxlength="12">
    </div>
    <button class="btn btn-primary" style="margin-left:8px" onclick="saveRow(${id})">Save</button>
    <button class="btn btn-ghost" onclick="loadCompanies()">Cancel</button>`;
  document.getElementById('ename-' + id).focus();
}

async function saveRow(id) {
  const name = document.getElementById('ename-' + id).value.trim();
  const uen  = document.getElementById('euen-' + id).value.trim();
  if (!name) { showAlert('Name is required', 'err'); return; }
  const r = await fetch('/api/companies/' + id, {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, uen })
  });
  const d = await r.json();
  if (d.success) { showAlert('Saved', 'ok'); loadCompanies(); }
  else showAlert(d.error || 'Error', 'err');
}

async function addCompany() {
  const name = document.getElementById('newName').value.trim();
  const uen  = document.getElementById('newUen').value.trim();
  if (!name) { showAlert('Name is required', 'err'); return; }
  const r = await fetch('/api/companies', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, uen })
  });
  const d = await r.json();
  if (d.success) {
    showAlert('Company added', 'ok');
    document.getElementById('newName').value = '';
    document.getElementById('newUen').value = '';
    loadCompanies();
  } else showAlert(d.error || 'Error', 'err');
}

async function deleteCompany(id, name) {
  if (!confirm(`Delete ${name}?`)) return;
  const r = await fetch('/api/companies/' + id, { method: 'DELETE' });
  const d = await r.json();
  if (d.success) { showAlert('Deleted', 'ok'); loadCompanies(); }
  else showAlert(d.error || 'Error', 'err');
}

function showAlert(m, t) {
  const el = document.getElementById('alertBox');
  el.className = 'alert alert-' + t;
  el.textContent = m;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

async function logout() { await fetch('/api/auth/logout', {method:'POST'}); location.href='/login'; }

load();
</script>
</body>
</html>
