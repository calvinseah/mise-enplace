<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Mise — Leave</title>
<style>
:root{--ink:#1A2318;--green:#3D5240;--surface:#F0F2EC;--card:#fff;--ink-60:rgba(26,35,24,.6);--ink-30:rgba(26,35,24,.3);--ink-08:rgba(26,35,24,.08);--font:'Inter',sans-serif;--font-d:'DM Serif Display',serif;--success:#2E6B3E;--success-bg:#F0FDF4;--danger:#C0392B;--warn:#B7791F;--warn-bg:#FFFBEB;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--surface);color:var(--ink);min-height:100vh;max-width:480px;margin:0 auto}
.header{background:#1A2318;padding:14px 20px;display:flex;align-items:center;gap:10px}
.icon{width:28px;height:28px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center}
.icon span{font-family:var(--font-d);font-size:16px;color:#fff;font-style:italic}
.brand{font-family:var(--font-d);font-size:16px;color:#fff}
.back-btn{margin-left:auto;color:rgba(255,255,255,.5);text-decoration:none;font-size:12px;display:flex;align-items:center;gap:4px}
.body{padding:16px}
.section-title{font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* Staff search */
.search-box{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:14px;margin-bottom:14px}
.search-input{width:100%;height:40px;padding:0 14px;border:1px solid var(--ink-08);border-radius:10px;font-size:14px;font-family:var(--font);outline:none;background:var(--surface);color:var(--ink)}
.result-item{padding:10px 12px;background:var(--card);border-radius:10px;border:1px solid var(--ink-08);margin-top:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink)}
.result-item:active{background:var(--surface)}

/* Selected staff */
.staff-card{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0}
.change-btn{margin-left:auto;height:28px;padding:0 12px;border-radius:7px;border:1px solid var(--ink-08);background:var(--surface);font-size:11.5px;color:var(--ink-60);cursor:pointer;font-family:var(--font)}

/* Balances */
.balances{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.bal-card{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:12px}
.bal-label{font-size:10px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.bal-num{font-size:22px;font-weight:400;font-family:var(--font-d)}
.bal-total{font-size:11px;color:var(--ink-30)}
.bal-bar{height:4px;background:var(--surface);border-radius:2px;margin-top:8px;overflow:hidden}
.bal-fill{height:100%;border-radius:2px}

/* Form */
.form-card{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:14px;margin-bottom:14px}
.fg{margin-bottom:10px}
.fg label{font-size:10.5px;font-weight:600;color:var(--ink-60);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.fg select,.fg input,.fg textarea{width:100%;height:38px;padding:0 12px;border:1px solid var(--ink-08);border-radius:8px;font-size:13px;font-family:var(--font);color:var(--ink);background:var(--surface);outline:none;-webkit-appearance:none}
.fg textarea{height:64px;padding:10px 12px;resize:none}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.days-badge{display:inline-flex;align-items:center;gap:5px;background:var(--success-bg);border:1px solid rgba(46,107,62,.2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:500;color:var(--success);margin-bottom:10px}
.submit-btn{width:100%;height:44px;border-radius:12px;background:var(--green);color:#fff;border:none;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.msg{padding:10px 12px;border-radius:8px;font-size:12.5px;font-weight:500;margin-bottom:10px;display:none}
.msg-ok{background:var(--success-bg);color:var(--success);border:1px solid rgba(46,107,62,.2)}
.msg-err{background:#FEF2F2;color:var(--danger);border:1px solid rgba(192,57,43,.2)}

/* History */
.hist-item{background:var(--card);border-radius:12px;border:1px solid var(--ink-08);padding:12px;margin-bottom:8px}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-type{font-size:13px;font-weight:600;color:var(--ink)}
.hist-badge{border-radius:6px;padding:2px 8px;font-size:10.5px;font-weight:600}
.badge-pending{background:var(--warn-bg);color:var(--warn);border:1px solid #FDE68A}
.badge-approved{background:var(--success-bg);color:var(--success);border:1px solid rgba(46,107,62,.2)}
.badge-rejected{background:#FEF2F2;color:var(--danger);border:1px solid rgba(192,57,43,.2)}
.cancel-btn{margin-top:6px;height:26px;padding:0 12px;border-radius:6px;border:1px solid rgba(192,57,43,.2);background:rgba(192,57,43,.06);color:var(--danger);font-size:11px;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>

<div class="header">
  <div class="icon"><span>M</span></div>
  <div class="brand">Mise</div>
  <a href="/" class="back-btn">← Back</a>
</div>

<div class="body">

  <!-- Staff search section -->
  <div id="searchSection">
    <div class="search-box">
      <div class="section-title" style="margin-bottom:10px">Leave Application</div>
      <div style="font-size:13px;color:var(--ink-60);margin-bottom:10px">Search your name to continue</div>
      <input type="text" id="staffSearch" class="search-input" placeholder="Type your name…" oninput="searchStaff()" autocomplete="off">
      <div id="searchResults"></div>
    </div>
  </div>

  <!-- Leave content (after staff selected) -->
  <div id="leaveContent" style="display:none">

    <!-- Staff card -->
    <div class="staff-card" id="staffCard">
      <div class="avatar" id="staffAvatar"></div>
      <div>
        <div style="font-size:14px;font-weight:600" id="staffNameEl"></div>
        <div style="font-size:11.5px;color:var(--ink-60)" id="staffRoleEl"></div>
      </div>
      <button class="change-btn" onclick="reset()">Change</button>
    </div>

    <!-- Balances -->
    <div class="section-title">Leave balance — <span id="balYear"></span></div>
    <div class="balances" id="balances"></div>

    <!-- Application form -->
    <div class="form-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Apply for leave</div>
      <div class="fg">
        <label>Leave type</label>
        <select id="leaveType" onchange="calcDays()">
          <option value="">— Select —</option>
          <option>Annual Leave</option>
          <option>Medical Leave</option>
          <option>Childcare Leave</option>
          <option>Maternity Leave</option>
          <option>Paternity Leave</option>
          <option>Unpaid Leave</option>
        </select>
      </div>
      <div class="date-row">
        <div class="fg" style="margin:0">
          <label>From</label>
          <input type="date" id="leaveFrom" onchange="calcDays()">
        </div>
        <div class="fg" style="margin:0">
          <label>To</label>
          <input type="date" id="leaveTo" onchange="calcDays()">
        </div>
      </div>
      <div id="daysBadge" style="display:none" class="days-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span id="daysText"></span>
      </div>
      <div class="fg">
        <label>Reason (optional)</label>
        <textarea id="leaveReason" placeholder="e.g. Family trip"></textarea>
      </div>
      <div id="formMsg" class="msg"></div>
      <button class="submit-btn" onclick="submitLeave()">Submit application</button>
    </div>

    <!-- History -->
    <div class="section-title">Recent applications</div>
    <div id="history"></div>

  </div>
</div>

<script>
let staffId = null;
const yr = new Date().getFullYear();
document.getElementById('balYear').textContent = yr;

// Set today as default dates
const today = new Date().toISOString().slice(0,10);
document.getElementById('leaveFrom').value = today;
document.getElementById('leaveTo').value = today;

async function searchStaff() {
  const q = document.getElementById('staffSearch').value.trim();
  const res = document.getElementById('searchResults');
  if (q.length < 2) { res.innerHTML = ''; return; }
  try {
    const r = await fetch('/api/staff/public-search?q=' + encodeURIComponent(q));
    const staff = await r.json();
    if (!staff.length) { res.innerHTML = '<div style="font-size:13px;color:var(--ink-60);padding:8px 0">No full-time staff found</div>'; return; }
    res.innerHTML = staff.map(s =>
      '<div class="result-item" onclick="selectStaff(' + s.id + ',\'' + s.name.replace(/'/g,"\\'") + '\',\'' + (s.role||'') + '\')">' +
      s.name + '<span style="font-size:11px;color:var(--ink-60);margin-left:6px">' + (s.role||'') + ' · Full-time</span></div>'
    ).join('');
  } catch(e) {}
}

async function selectStaff(id, name, role) {
  staffId = id;
  document.getElementById('searchSection').style.display = 'none';
  document.getElementById('leaveContent').style.display = 'block';
  document.getElementById('staffAvatar').textContent = name.split(' ').map(w=>w[0]).slice(0,2).join('');
  document.getElementById('staffNameEl').textContent = name;
  document.getElementById('staffRoleEl').textContent = role + ' · Full-time';
  await loadBalances();
  await loadHistory();
}

function reset() {
  staffId = null;
  document.getElementById('staffSearch').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('searchSection').style.display = 'block';
  document.getElementById('leaveContent').style.display = 'none';
}

async function loadBalances() {
  try {
    const r = await fetch('/api/leave/balances?staffId=' + staffId + '&year=' + yr);
    const balances = await r.json();
    document.getElementById('balances').innerHTML = balances.map(b => {
      const pct = b.total_days > 0 ? Math.round((b.remaining / b.total_days) * 100) : 0;
      const color = pct > 50 ? 'var(--green)' : pct > 20 ? '#B7791F' : '#C0392B';
      const name = b.leave_type.replace(' Leave','');
      return '<div class="bal-card">' +
        '<div class="bal-label">' + name + '</div>' +
        '<div style="display:flex;align-items:baseline;gap:4px">' +
        '<div class="bal-num" style="color:' + color + '">' + b.remaining + '</div>' +
        '<div class="bal-total">/ ' + b.total_days + ' days</div></div>' +
        '<div class="bal-bar"><div class="bal-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
        '</div>';
    }).join('');
  } catch(e) {}
}

async function loadHistory() {
  try {
    const r = await fetch('/api/leave/applications?staffId=' + staffId + '&year=' + yr);
    const apps = await r.json();
    const el = document.getElementById('history');
    if (!apps.length) { el.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink-60);font-size:13px">No applications yet</div>'; return; }
    el.innerHTML = apps.map(a => {
      const s = a.status;
      const badgeCls = s === 'approved' ? 'badge-approved' : s === 'rejected' ? 'badge-rejected' : 'badge-pending';
      const startFmt = new Date(a.start_date).toLocaleDateString('en-SG',{day:'numeric',month:'short'});
      const endFmt = a.end_date !== a.start_date ? ' – ' + new Date(a.end_date).toLocaleDateString('en-SG',{day:'numeric',month:'short'}) : '';
      return '<div class="hist-item">' +
        '<div class="hist-top"><div class="hist-type">' + a.leave_type + '</div>' +
        '<span class="hist-badge ' + badgeCls + '">' + s.charAt(0).toUpperCase() + s.slice(1) + '</span></div>' +
        '<div style="font-size:12px;color:var(--ink-60)">' + startFmt + endFmt + '</div>' +
        '<div style="font-size:11.5px;color:var(--ink-30)">' + a.days + ' day' + (a.days !== 1 ? 's' : '') + '</div>' +
        (s === 'pending' ? '<button class="cancel-btn" onclick="cancelLeave(' + a.id + ')">Cancel</button>' : '') +
        '</div>';
    }).join('');
  } catch(e) {}
}

function calcDays() {
  const from = document.getElementById('leaveFrom').value;
  const to = document.getElementById('leaveTo').value;
  const badge = document.getElementById('daysBadge');
  if (!from || !to || to < from) { badge.style.display = 'none'; return; }
  let count = 0;
  const cur = new Date(from + 'T00:00:00');
  const last = new Date(to + 'T00:00:00');
  while (cur <= last) {
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  document.getElementById('daysText').textContent = count + ' working day' + (count !== 1 ? 's' : '');
  badge.style.display = count > 0 ? 'inline-flex' : 'none';
}
calcDays();

async function submitLeave() {
  const type = document.getElementById('leaveType').value;
  const from = document.getElementById('leaveFrom').value;
  const to = document.getElementById('leaveTo').value;
  const reason = document.getElementById('leaveReason').value;
  if (!type) { showMsg('Please select a leave type', 'err'); return; }
  if (!from || !to) { showMsg('Please select dates', 'err'); return; }
  try {
    const r = await fetch('/api/leave/apply', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ staffId, leave_type: type, start_date: from, end_date: to, reason })
    });
    const d = await r.json();
    if (d.success) {
      showMsg('Application submitted — ' + d.days + ' day' + (d.days !== 1 ? 's' : ''), 'ok');
      document.getElementById('leaveType').value = '';
      document.getElementById('leaveReason').value = '';
      document.getElementById('daysBadge').style.display = 'none';
      await loadBalances();
      await loadHistory();
    } else showMsg(d.error || 'Error', 'err');
  } catch(e) { showMsg('Network error', 'err'); }
}

async function cancelLeave(id) {
  if (!confirm('Cancel this application?')) return;
  try {
    const r = await fetch('/api/leave/' + id, { method: 'DELETE' });
    const d = await r.json();
    if (d.success) { await loadBalances(); await loadHistory(); }
  } catch(e) {}
}

function showMsg(msg, type) {
  const el = document.getElementById('formMsg');
  el.className = 'msg msg-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}
</script>
</body>
</html>
