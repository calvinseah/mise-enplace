<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>MAIse — Restaurant AI</title>
<style>
:root{--ink:#1A2318;--green:#3D5240;--green-d:#2A3B2D;--surface:#F0F2EC;--card:#fff;--ink-60:rgba(26,35,24,.6);--ink-08:rgba(26,35,24,.08);--font:'Inter',sans-serif;--font-d:'DM Serif Display',serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--green-d);color:var(--ink)}

.screen{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;background:var(--green-d)}

/* Header */
.header{padding:max(14px,env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;text-decoration:none;flex-shrink:0}
.header-title{flex:1;font-family:var(--font-d);font-size:18px;color:#fff}
.header-sub{font-size:11px;color:rgba(255,255,255,.4)}
.kb-link{height:30px;padding:0 12px;border-radius:20px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:11.5px;font-family:var(--font);cursor:pointer;text-decoration:none;display:flex;align-items:center}

/* Chat area */
.chat{flex:1;overflow-y:auto;padding:12px 16px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}

/* Welcome */
.welcome{text-align:center;padding:20px 16px 24px}
.welcome-icon{width:56px;height:56px;border-radius:16px;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-family:var(--font-d);font-style:italic;font-size:28px;color:#fff}
.welcome-title{font-family:var(--font-d);font-size:22px;color:#fff;margin-bottom:6px}
.welcome-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5}

/* Suggestion chips */
.chips-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 16px}
.chip-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 12px;cursor:pointer;text-align:left;font-family:var(--font);transition:background .12s}
.chip-card:active{background:rgba(255,255,255,.15)}
.chip-icon{font-size:20px;margin-bottom:8px;display:block}
.chip-label{font-size:12.5px;font-weight:500;color:#fff;line-height:1.3}

/* Messages */
.msg{margin-bottom:12px;display:flex;flex-direction:column}
.msg.user{align-items:flex-end}
.msg.assistant{align-items:flex-start}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.5}
.msg.user .bubble{background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:rgba(255,255,255,.1);color:#fff;border-bottom-left-radius:4px;white-space:pre-wrap}
.msg.assistant .bubble.thinking{color:rgba(255,255,255,.4);font-style:italic}
.msg-time{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;padding:0 4px}

/* Input */
.input-area{flex-shrink:0;background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:10px 16px;font-size:14px;font-family:var(--font);color:#fff;outline:none;resize:none;max-height:120px;line-height:1.4;-webkit-appearance:none}
.input-box::placeholder{color:rgba(255,255,255,.3)}
.input-box:focus{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.12)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--green);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .12s}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Edit-chips button (admin) */
.edit-chips-btn{display:block;margin:2px auto 16px;background:none;border:none;color:rgba(255,255,255,.45);font-size:12px;font-family:var(--font);cursor:pointer;padding:4px 8px}
.edit-chips-btn:active{color:rgba(255,255,255,.8)}

/* Editor modal */
.editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center}
.editor-overlay.open{display:flex}
.editor-modal{background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px max(20px,env(safe-area-inset-bottom));max-height:88vh;max-height:88dvh;overflow-y:auto}
.editor-title{font-family:var(--font-d);font-size:20px;color:var(--ink);margin-bottom:4px}
.editor-hint{font-size:12px;color:var(--ink-60);margin-bottom:14px}
.editor-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.er-icon{width:46px;flex-shrink:0;text-align:center;font-size:18px;border:1px solid var(--ink-08);border-radius:10px;padding:9px 4px;background:#fff;outline:none;font-family:var(--font)}
.er-fields{flex:1;display:flex;flex-direction:column;gap:6px}
.er-label,.er-prompt{border:1px solid var(--ink-08);border-radius:10px;padding:9px 11px;font-size:13px;font-family:var(--font);color:var(--ink);background:#fff;outline:none;width:100%}
.er-label:focus,.er-prompt:focus,.er-icon:focus{border-color:var(--green)}
.er-prompt{font-size:12px;color:var(--ink-60)}
.er-remove{flex-shrink:0;width:30px;height:30px;border:none;background:rgba(192,57,43,.1);color:#C0392B;border-radius:8px;font-size:18px;line-height:1;cursor:pointer}
.editor-add{display:block;width:100%;margin:4px 0 16px;background:none;border:1.5px dashed var(--ink-08);border-radius:12px;padding:11px;color:var(--green);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer}
.editor-actions{display:flex;gap:10px}
.editor-cancel,.editor-save{flex:1;height:44px;border-radius:12px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;border:none}
.editor-cancel{background:var(--ink-08);color:var(--ink)}
.editor-save{background:var(--green);color:#fff}
.editor-save:disabled{opacity:.5}
</style>
</head>
<body>
<div class="screen">
  <!-- Header -->
  <div class="header">
    <a href="/" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div>
      <div class="header-title">MAIse</div>
      <div class="header-sub">Restaurant AI Assistant</div>
    </div>
    <a href="/maise-kb" class="kb-link" id="kbLink" style="display:none">Knowledge base</a>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">M</div>
      <div class="welcome-title">Hi, I'm MAIse</div>
      <div class="welcome-sub">Ask me anything about your restaurant — labour costs, recipes, suppliers, staff, roster, or operations.</div>
    </div>

    <div class="chips-grid" id="chips"></div>
    <button class="edit-chips-btn" id="editChipsBtn" onclick="openEditor()" style="display:none">✏️ Edit these questions</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="inputBox" placeholder="Ask anything…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Suggestion editor (admin) -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-modal">
    <div class="editor-title">Home questions</div>
    <div class="editor-hint">These show as tap-to-ask buttons on the MAIse home screen.</div>
    <div class="editor-rows" id="editorRows"></div>
    <button class="editor-add" onclick="addEditorRow()">+ Add question</button>
    <div class="editor-actions">
      <button class="editor-cancel" onclick="closeEditor()">Cancel</button>
      <button class="editor-save" id="editorSaveBtn" onclick="saveEditor()">Save</button>
    </div>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputBox = document.getElementById('inputBox');
const sendBtn = document.getElementById('sendBtn');
let history = [];
let isLoggedIn = false;
let isAdmin = false;

// Check auth + load suggestion chips
fetch('/api/me').then(r => r.ok ? r.json() : null).then(me => {
  if (me) {
    isLoggedIn = true;
    isAdmin = me.role === 'admin';
    document.getElementById('kbLink').style.display = 'flex';
    if (isAdmin) document.getElementById('editChipsBtn').style.display = 'block';
  }
}).catch(()=>{});

loadChips();

function escAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function escTxt(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadChips() {
  try {
    const list = await fetch('/api/maise/suggestions').then(r => r.json());
    renderChips(Array.isArray(list) ? list : []);
  } catch(e) {}
}

function renderChips(list) {
  const grid = document.getElementById('chips');
  if (!grid) return;
  grid.innerHTML = '';
  list.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip-card';
    btn.innerHTML = `<span class="chip-icon">${escTxt(c.icon||'💬')}</span><span class="chip-label">${escTxt(c.label)}</span>`;
    btn.addEventListener('click', () => send(c.prompt || c.label));
    grid.appendChild(btn);
  });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function hideWelcome() {
  const w = document.getElementById('welcome');
  const c = document.getElementById('chips');
  const e = document.getElementById('editChipsBtn');
  if (w) w.remove();
  if (c) c.remove();
  if (e) e.remove();
}

// ── Suggestion editor (admin) ───────────────────────────────────────────────
let editorData = [];

async function openEditor() {
  try {
    const list = await fetch('/api/maise/suggestions').then(r => r.json());
    editorData = (Array.isArray(list) ? list : []).map(c => ({ icon: c.icon||'', label: c.label||'', prompt: c.prompt||'' }));
  } catch(e) { editorData = []; }
  if (!editorData.length) editorData.push({ icon:'', label:'', prompt:'' });
  renderEditorRows();
  document.getElementById('editorOverlay').classList.add('open');
}

function renderEditorRows() {
  const wrap = document.getElementById('editorRows');
  wrap.innerHTML = '';
  editorData.forEach((row, idx) => {
    const div = document.createElement('div');
    div.className = 'editor-row';
    div.innerHTML = `
      <input class="er-icon" maxlength="4" placeholder="🙂" value="${escAttr(row.icon)}">
      <div class="er-fields">
        <input class="er-label" placeholder="Button label (e.g. Today's labour costs)" value="${escAttr(row.label)}">
        <input class="er-prompt" placeholder="Question sent to MAIse (optional)" value="${escAttr(row.prompt)}">
      </div>
      <button class="er-remove" title="Remove">×</button>`;
    div.querySelector('.er-icon').addEventListener('input', e => editorData[idx].icon = e.target.value);
    div.querySelector('.er-label').addEventListener('input', e => editorData[idx].label = e.target.value);
    div.querySelector('.er-prompt').addEventListener('input', e => editorData[idx].prompt = e.target.value);
    div.querySelector('.er-remove').addEventListener('click', () => { editorData.splice(idx,1); renderEditorRows(); });
    wrap.appendChild(div);
  });
}

function addEditorRow() { editorData.push({ icon:'', label:'', prompt:'' }); renderEditorRows(); }
function closeEditor() { document.getElementById('editorOverlay').classList.remove('open'); }

async function saveEditor() {
  const clean = editorData
    .map(r => ({ icon:(r.icon||'').trim(), label:(r.label||'').trim(), prompt:(r.prompt||'').trim() }))
    .filter(r => r.label);
  const btn = document.getElementById('editorSaveBtn');
  btn.disabled = true;
  try {
    const d = await fetch('/api/maise/suggestions', {
      method: 'PUT', headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ suggestions: clean })
    }).then(r => r.json());
    if (d.success) { renderChips(d.suggestions); closeEditor(); }
    else alert(d.error || 'Could not save');
  } catch(e) { alert('Network error. Please try again.'); }
  btn.disabled = false;
}

function addMsg(role, text, thinking=false) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const time = new Date().toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit',hour12:true});
  div.innerHTML = `<div class="bubble${thinking?' thinking':''}">${text}</div><div class="msg-time">${time}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div.querySelector('.bubble');
}

async function send(text) {
  inputBox.value = text;
  sendMsg();
}

async function sendMsg() {
  const text = inputBox.value.trim();
  if (!text || sendBtn.disabled) return;

  hideWelcome();
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  inputBox.value = '';
  inputBox.style.height = 'auto';
  sendBtn.disabled = true;

  const thinkingBubble = addMsg('assistant', 'Thinking…', true);

  try {
    const r = await fetch('/api/maise/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(-8) })
    });
    const d = await r.json();

    if (d.error) {
      thinkingBubble.textContent = 'Sorry, something went wrong. Try again.';
      thinkingBubble.classList.remove('thinking');
    } else {
      thinkingBubble.textContent = d.reply;
      thinkingBubble.classList.remove('thinking');
      history.push({ role: 'assistant', content: d.reply });
    }
  } catch(e) {
    thinkingBubble.textContent = 'Network error. Please try again.';
    thinkingBubble.classList.remove('thinking');
  }

  sendBtn.disabled = false;
  chatEl.scrollTop = chatEl.scrollHeight;
  inputBox.focus();
}

// Keep the input + send button above the on-screen keyboard on mobile.
// Without this, iOS Safari leaves the bottom input behind the keyboard, so the
// send button can't be tapped and sending appears to do nothing.
const screenEl = document.querySelector('.screen');
if (window.visualViewport) {
  const fitToViewport = () => {
    screenEl.style.height = window.visualViewport.height + 'px';
    chatEl.scrollTop = chatEl.scrollHeight;
  };
  window.visualViewport.addEventListener('resize', fitToViewport);
  window.visualViewport.addEventListener('scroll', fitToViewport);
  inputBox.addEventListener('focus', () => setTimeout(fitToViewport, 100));
}
</script>
</body>
</html>
