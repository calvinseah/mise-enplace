<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mise — Sign in</title>
<style>
:root{--bg:#F0F2EC;--green:#3D5240;--green-l:#C8D5B9;--card:#fff;--card2:#E8EDE3;--text:#1A2318;--muted:rgba(26,35,24,.55);--danger:#C0392B;--font:'Inter',sans-serif;--font-d:'DM Serif Display',serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--card);border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(26,35,24,.09),0 1px 4px rgba(26,35,24,.05)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.brand-icon{width:40px;height:40px;background:var(--green);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon span{font-family:var(--font-d);font-size:22px;color:#fff;line-height:1;font-style:italic}
.brand-name{font-size:22px;font-weight:400;font-family:var(--font-d);color:var(--text)}
.brand-sub{font-size:12px;color:var(--muted);margin-top:1px}
.divider{height:1px;background:rgba(26,35,24,.08);margin-bottom:26px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11.5px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.fg input{width:100%;height:48px;background:var(--card2);border:none;border-radius:12px;padding:0 14px;font-size:15px;font-family:var(--font);color:var(--text);outline:none;transition:box-shadow .15s}
.fg input:focus{box-shadow:0 0 0 3px rgba(61,82,64,.18)}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .12s}
.eye-btn:hover{color:var(--text)}
.eye-btn svg{width:17px;height:17px;stroke:currentColor}
.err{background:rgba(192,57,43,.08);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--danger);margin-bottom:16px;display:none;align-items:center;gap:8px}
.err svg{width:15px;height:15px;flex-shrink:0;stroke:var(--danger)}
.btn{width:100%;height:52px;background:var(--green);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:500;font-family:var(--font);cursor:pointer;letter-spacing:-.01em;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn svg{width:17px;height:17px}
.back{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.back a{color:var(--green);text-decoration:none;font-weight:500}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:12px">
      <div class="brand-icon"><span>M</span></div>
      <div>
        <div class="brand-name">Mise</div>
        <div class="brand-sub">Manager access</div>
      </div>
    </a>
  </div>
  <div class="divider"></div>

  <div class="err" id="errBox">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="errText"></span>
  </div>

  <div class="fg">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autocapitalize="none" onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
  </div>
  <div class="fg">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      <button class="eye-btn" onclick="togglePw()" tabindex="-1">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    Sign in
  </button>

  <div class="back"><a href="/">← Back to home</a></div>
</div>

<script>
const eyeOpen=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeClosed=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function togglePw(){
  const i=document.getElementById('password');
  const show=i.type==='text';
  i.type=show?'password':'text';
  document.getElementById('eyeIcon').outerHTML=(show?eyeOpen:eyeClosed).replace('<svg','<svg id="eyeIcon"');
}

async function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errBox');
  if(!username||!password){showErr('Please enter your username and password.');return;}
  btn.disabled=true;
  btn.innerHTML=`<svg style="animation:spin 1s linear infinite;width:17px;height:17px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Signing in…`;
  err.style.display='none';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(d.success){
      const p=new URLSearchParams(location.search);
      location.href=p.get('next')||'/dashboard';
    } else {
      showErr(d.error||'Incorrect username or password.');
      btn.disabled=false;
      btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign in`;
    }
  }catch(e){showErr('Network error. Please try again.');btn.disabled=false;btn.innerHTML='Sign in';}
}
function showErr(m){document.getElementById('errText').textContent=m;document.getElementById('errBox').style.display='flex';}
document.getElementById('username').focus();
</script>
</body>
</html>
